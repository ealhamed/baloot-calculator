    function checkSayings(event) {
      const { currentGame, session } = appState;
      const score = currentGame.score;

      if (event === 'gameOver') {
        const wLana = session.wins.lana;
        const wLahum = session.wins.lahum;

        // Session sweep (2-0)
        if ((wLana === 2 && wLahum === 0) || (wLahum === 2 && wLana === 0)) {
          showSaying(SAYINGS.sweep20);
          return;
        }
        // Decider win (2-1)
        if ((wLana === 2 && wLahum === 1) || (wLahum === 2 && wLana === 1)) {
          showSaying(SAYINGS.deciderWin);
          return;
        }
        // Tied 1-1
        if (wLana === 1 && wLahum === 1) {
          showSaying(SAYINGS.tied11);
          return;
        }
        // First game won (1-0)
        const totalGames = wLana + wLahum;
        if (totalGames === 1) {
          showSaying(SAYINGS.gameWin1);
          return;
        }

        // Blowout check on the last finished game
        const lastGame = session.games[session.games.length - 1];
        if (lastGame) {
          const loserScore = Math.min(lastGame.finalScore.lana, lastGame.finalScore.lahum);
          if (loserScore < 50) {
            showSaying(SAYINGS.blowout);
            return;
          }
        }
        return;
      }

      if (event === 'roundEnd') {
        // Comeback: a team that was behind now leads
        const rounds = currentGame.rounds;
        if (rounds.length >= 2) {
          const lastRound = rounds[rounds.length - 1];
          const prevLana = score.lana - lastRound.bunt.lana;
          const prevLahum = score.lahum - lastRound.bunt.lahum;
          const wasLeading = prevLana > prevLahum ? 'lana' : (prevLahum > prevLana ? 'lahum' : null);
          const nowLeading = score.lana > score.lahum ? 'lana' : (score.lahum > score.lana ? 'lahum' : null);
          if (wasLeading && nowLeading && wasLeading !== nowLeading) {
            showSaying(SAYINGS.comeback);
            return;
          }
        }

        // Close to 152
        if (score.lana >= 130 || score.lahum >= 130) {
          showSaying(SAYINGS.closeTo152);
          return;
        }

        // Neck and neck
        if (score.lana > 20 && score.lahum > 20 && Math.abs(score.lana - score.lahum) <= 10) {
          showSaying(SAYINGS.neckAndNeck);
          return;
        }
      }
    }

    // ── بنت السبيت State ────────────────────────────────────────

    const SibeetState = {
      STORAGE_KEY: 'sibeet_state',

      _defaultState() {
        return {
          players: ['لاعب ١', 'لاعب ٢', 'لاعب ٣', 'لاعب ٤'],
          rounds: [],
          totals: [0, 0, 0, 0],
          doubleQueen: false,
          doubleDiamond: false,
          target: 100
        };
      },

      load() {
        try {
          const raw = localStorage.getItem(this.STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const def = this._defaultState();
            return {
              players: parsed.players || def.players,
              rounds: parsed.rounds || def.rounds,
              totals: parsed.totals || def.totals,
              doubleQueen: parsed.doubleQueen || false,
              doubleDiamond: parsed.doubleDiamond || false,
              target: parsed.target || 100
            };
          }
        } catch (e) {}
        return this._defaultState();
      },

      save(state) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
      },

      addRound(state, scores) {
        state.rounds.push({ scores: [...scores], doubleQueen: state.doubleQueen, doubleDiamond: state.doubleDiamond });
        for (let i = 0; i < 4; i++) state.totals[i] += scores[i];
        this.save(state);
        const tgt = state.target || 100;
        return { gameOver: state.totals.some(function(t) { return t >= tgt; }) };
      },

      undoLastRound(state) {
        if (state.rounds.length === 0) return;
        const last = state.rounds.pop();
        for (let i = 0; i < 4; i++) state.totals[i] -= last.scores[i];
        this.save(state);
      },

      newGame(state) {
        state.rounds = [];
        state.totals = [0, 0, 0, 0];
        this.save(state);
      },

      getExpectedTotal(state) {
        var total = 36;
        if (state.doubleQueen) total += 13;
        if (state.doubleDiamond) total += 10;
        return total;
      }
    };

    var sibeetState = SibeetState.load();

    // ── بنت السبيت UI ──────────────────────────────────────────

    function renderSibeet() {
      var s = sibeetState;
      var tgt = s.target || 100;
      var minScore = Math.min.apply(null, s.totals);

      // Player cards with embedded controls
      var scores = document.getElementById('sibeetScores');
      scores.innerHTML = s.players.map(function(name, i) {
        var pct = Math.min((s.totals[i] / tgt) * 100, 100);
        var danger = s.totals[i] >= (tgt * 0.8) ? ' danger' : '';
        var leader = (s.totals[i] === minScore && s.rounds.length > 0) ? ' leader' : '';
        return '<div class="sibeet-player' + danger + leader + '">' +
          '<div class="sibeet-player-name" onclick="renameSibeetPlayer(' + i + ')">' + name + '</div>' +
          '<div class="sibeet-player-total">' + s.totals[i] + '</div>' +
          '<div class="sibeet-player-bar"><div class="sibeet-player-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="sibeet-player-controls">' +
            '<button class="sib-toggle spade" id="sibQ' + i + '" onclick="toggleSibCard(' + i + ',\'queen\')" aria-label="بنت السبيت ' + name + '" aria-pressed="false" data-state="0"><span class="mult-badge" id="sibQB' + i + '">×1</span><span class="card-suit">♠</span><span class="card-val">Q</span></button>' +
            '<button class="sib-toggle diamond" id="sibD' + i + '" onclick="toggleSibCard(' + i + ',\'diamond\')" aria-label="١٠ ديمن ' + name + '" aria-pressed="false" data-state="0"><span class="mult-badge" id="sibDB' + i + '">×1</span><span class="card-suit">♦</span><span class="card-val">10</span></button>' +
            '<div class="sibeet-hearts-row">' +
              '<button class="sibeet-hearts-btn" onclick="stepHearts(' + i + ',1)" aria-label="زيادة هاص ' + name + '">+</button>' +
              '<div class="sibeet-hearts-circle" id="sibH' + i + '">' + SVG_HEART_BG + '<span>0</span></div>' +
              '<button class="sibeet-hearts-btn" onclick="stepHearts(' + i + ',-1)" aria-label="إنقاص هاص ' + name + '">−</button>' +
            '</div>' +
          '</div>' +
          '<div class="sibeet-player-round-total" id="sibPTotal' + i + '">+0</div>' +
        '</div>';
      }).join('');

      // Target buttons
      var isPreset = [100, 150, 200].indexOf(s.target) !== -1;
      document.querySelectorAll('.sibeet-target-btn').forEach(function(btn) {
        var val = parseInt(btn.textContent.replace(/[٠-٩]/g, function(d) { return '٠١٢٣٤٥٦٧٨٩'.indexOf(d); }).replace(/[^\d]/g, ''));
        btn.classList.toggle('active', val === s.target);
      });
      var customInput = document.getElementById('sibeetCustomTarget');
      if (customInput) {
        if (!isPreset) {
          customInput.value = s.target;
          customInput.classList.add('active');
        } else {
          customInput.value = '';
          customInput.classList.remove('active');
        }
      }

      // Round history
      var hasRounds = s.rounds.length > 0;
      document.getElementById('sibeetRoundsSection').style.display = hasRounds ? '' : 'none';
      var actionsEl = document.getElementById('sibeetActions');
      actionsEl.style.display = hasRounds ? 'flex' : 'none';

      if (hasRounds) {
        // Update column headers with player names
        s.players.forEach(function(name, i) {
          var h = document.getElementById('sColH' + (i + 1));
          if (h) h.textContent = name.substring(0, 4);
        });

        var list = document.getElementById('sibeetRoundsList');
        list.innerHTML = s.rounds.map(function(r, idx) {
          var maxScore = Math.max.apply(null, r.scores);
          return '<div class="sibeet-round-row">' +
            '<span class="sibeet-round-num">' + (idx + 1) + '</span>' +
            r.scores.map(function(sc) {
              return '<span' + (sc === maxScore && maxScore > 0 ? ' class="sibeet-round-high"' : '') + '>' + sc + '</span>';
            }).join('') +
          '</div>';
        }).join('');
      }

      // Validation message
      document.getElementById('sibeetValidation').textContent = '';

      // Block entry if game is over
      var gameOver = s.totals.some(function(t) { return t >= (s.target || 100); });
      var entryEl = document.querySelector('.sibeet-entry');
      if (entryEl) entryEl.style.display = gameOver ? 'none' : '';
      // Hide controls in player cards
      document.querySelectorAll('.sibeet-player-controls, .sibeet-player-round-total').forEach(function(el) {
        el.style.display = gameOver ? 'none' : '';
      });
    }


    function toggleSibCard(player, type) {
      var prefix = type === 'queen' ? 'sibQ' : 'sibD';
      var el = document.getElementById(prefix + player);
      var state = parseInt(el.dataset.state) || 0;
      var nextState = (state + 1) % 3; // 0 → 1 → 2 → 0

      var badgePrefix = type === 'queen' ? 'sibQB' : 'sibDB';

      if (nextState === 1) {
        // Activating: deactivate all others first (only one player per card)
        for (var j = 0; j < 4; j++) {
          var btn = document.getElementById(prefix + j);
          btn.classList.remove('active', 'doubled');
          btn.dataset.state = '0';
          btn.setAttribute('aria-pressed', 'false');
          document.getElementById(badgePrefix + j).textContent = '×1';
        }
        el.classList.add('active');
        el.dataset.state = '1';
        el.setAttribute('aria-pressed', 'true');
        document.getElementById(badgePrefix + player).textContent = '×1';
      } else if (nextState === 2) {
        // Doubling
        el.classList.remove('active');
        el.classList.add('doubled');
        el.dataset.state = '2';
        document.getElementById(badgePrefix + player).textContent = '×2';
      } else {
        // Back to off
        el.classList.remove('active', 'doubled');
        el.dataset.state = '0';
        el.setAttribute('aria-pressed', 'false');
        document.getElementById(badgePrefix + player).textContent = '×1';
      }

      if (navigator.vibrate) navigator.vibrate(nextState === 2 ? [10, 30, 10] : 10);
      updateSibeetTotals();
    }

    function getTotalHearts() {
      var total = 0;
      for (var i = 0; i < 4; i++) total += parseInt(document.getElementById('sibH' + i).textContent) || 0;
      return total;
    }

    function getHeartsVal(i) {
      return parseInt(document.getElementById('sibH' + i).textContent) || 0;
    }

    const SVG_HEART_BG = '<svg class="heart-bg" viewBox="0 0 52 52"><path d="M26 47 C26 47 4 32 4 17 4 9 10 4 17 4 21 4 24 6 26 9 28 6 31 4 35 4 42 4 48 9 48 17 48 32 26 47 26 47Z" fill="#C41E3A"/></svg>';
    function setHeartsVal(i, val) {
      document.getElementById('sibH' + i).innerHTML = SVG_HEART_BG + '<span>' + val + '</span>';
    }

    function stepHearts(player, delta) {
      var cur = getHeartsVal(player);
      var newVal = cur + delta;
      if (newVal < 0) return;
      if (delta > 0 && getTotalHearts() >= 13) return;
      if (newVal > 13) return;
      if (newVal !== cur && navigator.vibrate) navigator.vibrate(8);
      setHeartsVal(player, newVal);
      updateSibeetTotals();
    }

    function getCardVal(prefix, i) {
      var state = parseInt(document.getElementById(prefix + i).dataset.state) || 0;
      if (state === 0) return 0;
      var base = prefix === 'sibQ' ? 13 : 10;
      return state === 2 ? base * 2 : base;
    }

    function updateSibeetTotals() {
      for (var i = 0; i < 4; i++) {
        var total = getCardVal('sibQ', i) + getCardVal('sibD', i) + getHeartsVal(i);
        var el = document.getElementById('sibPTotal' + i);
        el.textContent = total > 0 ? '+' + total : '+0';
        el.style.opacity = total > 0 ? '1' : '0.3';
      }
    }

    function setSibeetTarget(val) {
      sibeetState.target = val;
      SibeetState.save(sibeetState);
      var customInput = document.getElementById('sibeetCustomTarget');
      if (customInput) { customInput.value = ''; customInput.classList.remove('active'); }
      renderSibeet();
    }

    function setCustomSibeetTarget(val) {
      var num = parseInt(val);
      if (!num || num < 10) return;
      sibeetState.target = num;
      SibeetState.save(sibeetState);
      // Deactivate preset buttons, activate input
      document.querySelectorAll('.sibeet-target-btn').forEach(function(btn) { btn.classList.remove('active'); });
      var customInput = document.getElementById('sibeetCustomTarget');
      if (customInput) customInput.classList.add('active');
      renderSibeet();
    }

    var sibeetSubmitLocked = false;
    function submitSibeet() {
      if (sibeetSubmitLocked) return;
      var scores = [];
      var totalHearts = 0;

      for (var i = 0; i < 4; i++) {
        var total = getCardVal('sibQ', i) + getCardVal('sibD', i);
        var hearts = getHeartsVal(i);
        total += hearts;
        totalHearts += hearts;
        scores.push(total);
      }

      // Validate hearts total = 13
      if (totalHearts !== 13) {
        document.getElementById('sibeetValidation').textContent = 'مجموع الهاص لازم يكون ١٣ (الحالي: ' + totalHearts + ')';
        return;
      }

      // Validate queen assigned
      var queenCount = 0;
      for (var i = 0; i < 4; i++) {
        if (parseInt(document.getElementById('sibQ' + i).dataset.state) > 0) queenCount++;
      }
      if (queenCount !== 1) {
        document.getElementById('sibeetValidation').textContent = 'حدد من عنده بنت السبيت';
        return;
      }

      // Validate diamond assigned
      var diamondCount = 0;
      for (var i = 0; i < 4; i++) {
        if (parseInt(document.getElementById('sibD' + i).dataset.state) > 0) diamondCount++;
      }
      if (diamondCount !== 1) {
        document.getElementById('sibeetValidation').textContent = 'حدد من عنده ١٠ ديمن';
        return;
      }

      sibeetSubmitLocked = true;
      if (navigator.vibrate) navigator.vibrate(15);
      var result = SibeetState.addRound(sibeetState, scores);
      renderSibeet();
      setTimeout(function() { sibeetSubmitLocked = false; }, 400);

      if (result.gameOver) {
        showSibeetGameOver();
      }
    }

    function showSibeetGameOver() {
      var s = sibeetState;
      var ranked = s.players.map(function(name, i) { return { name: name, score: s.totals[i] }; })
        .sort(function(a, b) { return a.score - b.score; });

      var medals = ['🥇', '🥈', '🥉', ''];
      var barColors = ['var(--gold)', 'rgba(192,192,192,0.7)', 'rgba(205,127,50,0.7)', 'rgba(245,240,230,0.2)'];

      var overlay = document.createElement('div');
      overlay.className = 'game-over-overlay';
      overlay.innerHTML =
        '<h2>انتهت اللعبة!</h2>' +
        '<div style="font-size:20px;font-weight:700;margin-bottom:4px">' + ranked[0].name + ' الأقل نقاط!</div>' +
        '<div style="width:100%;max-width:300px;margin-top:12px">' +
          ranked.map(function(p, i) {
            var pct = ranked[3] && ranked[3].score > 0 ? Math.max(20, (p.score / ranked[3].score) * 100) : 50;
            return '<div style="margin-bottom:8px">' +
              '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">' +
                '<span style="font-size:14px;font-weight:600">' + (medals[i] || '') + ' ' + p.name + '</span>' +
                '<span style="font-size:16px;font-weight:700">' + p.score + '</span>' +
              '</div>' +
              '<div style="height:6px;background:rgba(245,240,230,0.1);border-radius:3px;overflow:hidden">' +
                '<div style="height:100%;width:' + pct + '%;background:' + barColors[i] + ';border-radius:3px;transition:width 0.6s ease"></div>' +
              '</div>' +
            '</div>';
          }).join('') +
        '</div>' +
        '<button onclick="this.parentElement.remove()" style="font-size:16px;margin-top:16px;padding:12px 32px">متابعة</button>';
      document.body.appendChild(overlay);
    }

    async function renameSibeetPlayer(idx) {
      var name = await appPrompt('اسم اللاعب:', sibeetState.players[idx]);
      if (name) {
        sibeetState.players[idx] = name;
        SibeetState.save(sibeetState);
        renderSibeet();
      }
    }

    async function undoSibeetRound() {
      if (sibeetState.rounds.length === 0) return;
      if (!(await appConfirm('تراجع عن آخر جولة؟'))) return;
      SibeetState.undoLastRound(sibeetState);
      renderSibeet();
    }

    async function newSibeetGame() {
      if (!(await appConfirm('لعبة جديدة؟ سيتم مسح جميع النتائج'))) return;
      SibeetState.newGame(sibeetState);
      renderSibeet();
    }

    // Auto-join room from URL parameter
    (function() {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam && roomParam.length === 4) {
        // Clean URL without reloading
        window.history.replaceState({}, '', window.location.pathname);
        // Auto-join after a short delay for PeerJS to load
        setTimeout(() => {
          document.getElementById('joinCodeInput').value = roomParam.toUpperCase();
          doJoinRoom();
        }, 500);
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
