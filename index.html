    async function submitAdvanced() {
      if (advState.multiplier === 'coffee') {
        // Ask who won the coffee round
        const buyerName = tl(advState.buyer);
        const buyerWon = await appConfirm(`هل فاز المشتري (${buyerName}) بالجولة؟`);
        const winner = buyerWon ? advState.buyer : (advState.buyer === 'lana' ? 'lahum' : 'lana');
        const result = StateManager.handleCoffee(appState, winner);
        resetAdvancedForm();
        render();
        checkSayings('gameOver');
        showGameOver(result.winner);
        broadcastState();
        return;
      }

      const kabout = document.getElementById('advKabout').checked;
      const mult = { normal: 1, double: 2, triple: 3, four: 4 }[advState.multiplier] || 1;
      const type = advState.type;
      let lana = 0, lahum = 0;

      if (kabout) {
        const winner = advState.kaboutWinner || advState.buyer;
        const winnerTeam = winner === 'lana' ? 'Lana' : 'Lahum';
        const kaboutBunt = BalootScoring.KABOUT_BUNT[type] * mult;
        const projBunt = BalootScoring.calcProjects(getProjectCounts(winnerTeam), type, mult);
        if (winner === 'lana') { lana = kaboutBunt + projBunt; } else { lahum = kaboutBunt + projBunt; }
      } else {
        const buntLana = parseInt(document.getElementById('advBuntLana').textContent) || 0;
        const buntLahum = parseInt(document.getElementById('advBuntLahum').textContent) || 0;
        const projLana = BalootScoring.calcProjects(getProjectCounts('Lana'), type, mult);
        const projLahum = BalootScoring.calcProjects(getProjectCounts('Lahum'), type, mult);

        const buyer = advState.buyer;
        const opponent = buyer === 'lana' ? 'lahum' : 'lana';
        const buyerBunt = buyer === 'lana' ? buntLana : buntLahum;
        const opponentBunt = buyer === 'lana' ? buntLahum : buntLana;

        if (opponentBunt > buyerBunt && (buntLana > 0 || buntLahum > 0)) {
          const allBunt = BalootScoring.TOTAL_BUNT[type] * mult;
          const oppProj = opponent === 'lana' ? projLana : projLahum;
          if (opponent === 'lana') { lana = allBunt + oppProj; } else { lahum = allBunt + oppProj; }
        } else {
          lana = (buntLana * mult) + projLana;
          lahum = (buntLahum * mult) + projLahum;
        }
      }

      if (lana === 0 && lahum === 0) return;

      const roundMeta = {
        type: advState.type,
        buyer: advState.buyer,
        multiplier: advState.multiplier,
        kabout,
        projects: { lana: getProjectCounts('Lana'), lahum: getProjectCounts('Lahum') }
      };

      const result = StateManager.addRound(appState, { lana, lahum }, roundMeta);
      document.querySelector('#advancedForm .btn-primary').classList.add('btn-flash');
      setTimeout(() => document.querySelector('#advancedForm .btn-primary').classList.remove('btn-flash'), 300);
      resetAdvancedForm();
      render();
      checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
      if (result.gameOver) showGameOver(result.winner);
      broadcastState();
    }

    function calcGameStats(game) {
      const rounds = game.rounds || [];
      const stats = {
        totalRounds: rounds.length,
        buyCount: { lana: 0, lahum: 0 },
        sunCount: 0,
        hokmCount: 0,
        kaboutCount: { lana: 0, lahum: 0 },
        projectCount: { lana: 0, lahum: 0 },
        biggestRound: { team: '', score: 0 },
        closestRound: { diff: 999, lana: 0, lahum: 0 },
        doubleCount: 0
      };

      for (const r of rounds) {
        if (r.type === 'coffee') continue;

        // Buyer count
        if (r.buyer) stats.buyCount[r.buyer]++;

        // Type count
        if (r.type === 'sun') stats.sunCount++;
        if (r.type === 'hokm') stats.hokmCount++;

        // Kabout
        if (r.kabout) {
          const kw = r.kaboutWinner || r.buyer || 'lana';
          stats.kaboutCount[kw]++;
        }

        // Projects
        if (r.projects) {
          for (const team of ['lana', 'lahum']) {
            const proj = r.projects[team];
            if (proj) {
              if (typeof proj === 'object' && !Array.isArray(proj)) {
                stats.projectCount[team] += Object.values(proj).reduce((a, b) => a + b, 0);
              } else if (Array.isArray(proj)) {
                stats.projectCount[team] += proj.length;
              }
            }
          }
        }

        // Multiplier
        if (r.multiplier && r.multiplier !== 'normal') stats.doubleCount++;

        // Biggest round
        if (r.bunt) {
          if (r.bunt.lana > stats.biggestRound.score) {
            stats.biggestRound = { team: 'lana', score: r.bunt.lana };
          }
          if (r.bunt.lahum > stats.biggestRound.score) {
            stats.biggestRound = { team: 'lahum', score: r.bunt.lahum };
          }

          // Closest round
          const diff = Math.abs(r.bunt.lana - r.bunt.lahum);
          if (diff < stats.closestRound.diff && diff > 0) {
            stats.closestRound = { diff, lana: r.bunt.lana, lahum: r.bunt.lahum };
          }
        }
      }

      return stats;
    }

    function buildStatsHTML(stats, finalScore) {
      const rows = [];

      // Total rounds
      rows.push(`<div class="stat-row"><span>عدد الجولات</span><span>${stats.totalRounds}</span></div>`);

      // Sun vs Hokm
      if (stats.sunCount > 0 || stats.hokmCount > 0) {
        rows.push(`<div class="stat-row"><span>صن / حكم</span><span>${stats.sunCount} / ${stats.hokmCount}</span></div>`);
      }

      // Who bought more
      if (stats.buyCount.lana > 0 || stats.buyCount.lahum > 0) {
        const moreBuyer = tl(stats.buyCount.lana >= stats.buyCount.lahum ? 'lana' : 'lahum');
        rows.push(`<div class="stat-row"><span>أكثر فريق اشترى</span><span>${moreBuyer} (${Math.max(stats.buyCount.lana, stats.buyCount.lahum)})</span></div>`);
      }

      // Who had more projects
      if (stats.projectCount.lana > 0 || stats.projectCount.lahum > 0) {
        const moreProj = tl(stats.projectCount.lana >= stats.projectCount.lahum ? 'lana' : 'lahum');
        rows.push(`<div class="stat-row"><span>أكثر فريق مشاريع</span><span>${moreProj} (${Math.max(stats.projectCount.lana, stats.projectCount.lahum)})</span></div>`);
      }

      // Kabout
      const totalKabout = stats.kaboutCount.lana + stats.kaboutCount.lahum;
      if (totalKabout > 0) {
        rows.push(`<div class="stat-row"><span>كبوت</span><span>${tl('lana')} ${stats.kaboutCount.lana} • ${tl('lahum')} ${stats.kaboutCount.lahum}</span></div>`);
      }

      // Doubles
      if (stats.doubleCount > 0) {
        rows.push(`<div class="stat-row"><span>جولات مضاعفة</span><span>${stats.doubleCount}</span></div>`);
      }

      // Biggest round
      if (stats.biggestRound.score > 0) {
        const team = tl(stats.biggestRound.team);
        rows.push(`<div class="stat-row"><span>أعلى جولة</span><span>${team} — ${stats.biggestRound.score}</span></div>`);
      }

      // Closest round
      if (stats.closestRound.diff < 999) {
        rows.push(`<div class="stat-row"><span>أقرب جولة</span><span>${stats.closestRound.lana} - ${stats.closestRound.lahum}</span></div>`);
      }

      return rows.join('');
    }

    function showGameOver(winner) {
      // Get the last finished game's stats
      const lastGame = appState.session.games[appState.session.games.length - 1];
      const stats = lastGame ? calcGameStats(lastGame) : null;
      const finalScore = lastGame ? lastGame.finalScore : { lana: 0, lahum: 0 };

      const overlay = document.createElement('div');
      overlay.className = 'game-over-overlay';
      overlay.innerHTML = `
        <h2>انتهت اللعبة!</h2>
        <div class="winner-text">${tl(winner)} فاز</div>
        <div style="font-size:18px;margin-bottom:16px;opacity:0.7">${finalScore.lana} - ${finalScore.lahum}</div>
        ${stats ? `
          <div class="stats-card">
            <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;text-align:center">إحصائيات اللعبة</div>
            ${buildStatsHTML(stats, finalScore)}
          </div>
        ` : ''}
        <button onclick="this.parentElement.remove()" style="font-size:16px;margin-top:16px">متابعة</button>
      `;
      document.body.appendChild(overlay);
    }

    // ── Room Manager (P2P + Firebase fallback) ────────────────

    const PEER_PREFIX = 'blot1-';
    const FB_NS = 'baloot';
    let peer = null;
    let connections = [];
    let hostConn = null;
    let isHost = false;
    let editUnlocked = false;
    let roomCode = '';
    let roomMode = 'p2p';
    let fbUnsubState = null, fbUnsubMsgs = null, fbMyId = null, p2pFallbackAttempted = false;

    function genRoomCode() {
      return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function saveRoomSession(role, code) {
      sessionStorage.setItem('baloot_room', JSON.stringify({ role, code }));
    }
    function clearRoomSession() {
      sessionStorage.removeItem('baloot_room');
    }

    function handleHostMessage(conn, msg) {
      if (msg.type === 'round_added' && editUnlocked) {
        const result = StateManager.addRound(appState, msg.payload.bunt, msg.payload.meta || {});
        render();
        checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
        broadcastState();
      }
    }

    function createRoom() {
      roomCode = genRoomCode();
      document.getElementById('roomModalTitle').textContent = 'غرفة جديدة';
      document.getElementById('roomCreateView').style.display = '';
      document.getElementById('roomJoinView').style.display = 'none';
      document.getElementById('roomCodeDisplay').textContent = roomCode;
      // Generate join URL and QR code
      const joinUrl = window.location.href.split('?')[0] + '?room=' + roomCode;
      const qrBox = document.getElementById('qrBox');
      qrBox.innerHTML = '';
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      new QRCode(qrBox, {
        text: joinUrl, width: 160, height: 160,
        colorDark: isDark ? '#E8E4DC' : '#1A2744',
        colorLight: isDark ? '#1A1A2E' : '#F5F0E6',
        correctLevel: QRCode.CorrectLevel.M
      });
      document.getElementById('connectedCount').textContent = 'جاري الاتصال...';
      pushOverlay('roomModal');
      document.getElementById('roomModal').classList.add('open');
      editUnlocked = false;

      isHost = true;
      connections = [];
      showRoomStatus('غرفة ' + roomCode + ' • جاري الاتصال...');

      peer = new Peer(PEER_PREFIX + roomCode.toLowerCase(), {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        document.getElementById('connectedCount').textContent = 'جاهز • ٠ متصلين';
        showRoomStatus('غرفة ' + roomCode + ' • معزّب • ٠ متصلين');
        saveRoomSession('host', roomCode);
      });

      peer.on('connection', conn => {
        connections.push(conn);
        updateConnCount();
        conn.on('data', msg => handleHostMessage(conn, msg));
        conn.on('close', () => { connections = connections.filter(c => c !== conn); updateConnCount(); });
        conn.on('open', () => {
          conn.send({ type: 'state_sync', payload: getStatePayload() });
          conn.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
        });
      });

      peer.on('error', err => {
        console.error('Peer error:', err);
        if (!p2pFallbackAttempted && (String(err).indexOf('server') !== -1 || err.type === 'network' || err.type === 'socket-error' || err.type === 'unavailable-id')) {
          p2pFallbackAttempted = true;
          document.getElementById('connectedCount').textContent = 'يتم التحويل إلى الغرفة الكبيرة...';
          if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
          connections = []; isHost = false;
          setTimeout(() => { roomMode = 'firebase'; createRoomFirebase(); }, 500);
          return;
        }
        document.getElementById('connectedCount').textContent = 'لم يتم الاتصال، تأكد من الإنترنت';
      });
    }

    function joinRoom() {
      document.getElementById('roomModalTitle').textContent = 'انضم لغرفة';
      document.getElementById('roomCreateView').style.display = 'none';
      document.getElementById('roomJoinView').style.display = '';
      document.getElementById('joinCodeInput').value = '';
      document.getElementById('joinError').textContent = '';
      pushOverlay('roomModal');
      document.getElementById('roomModal').classList.add('open');
    }

    function doJoinRoom() {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      if (!code) {
        document.getElementById('joinError').textContent = 'أدخل رمز الغرفة';
        return;
      }
      if (code.charAt(0) === 'F' && code.charAt(1) === '-') {
        return doJoinRoomFirebase(code.substring(2));
      }
      if (code.length !== 4) {
        document.getElementById('joinError').textContent = 'أدخل رمز من ٤ أحرف';
        return;
      }
      document.getElementById('joinError').textContent = '';
      document.getElementById('joinSpinner').style.display = '';
      isHost = false;
      roomCode = code;

      peer = new Peer(undefined, {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        hostConn = peer.connect(PEER_PREFIX + code.toLowerCase());

        hostConn.on('open', () => {
          document.getElementById('joinSpinner').style.display = 'none';
          closeRoomModal();
          showRoomStatus('غرفة ' + code + ' • متصل');
          saveRoomSession('joiner', code);
        });

        hostConn.on('data', msg => {
          switch (msg.type) {
            case 'state_sync':
              applyStatePayload(msg.payload);
              render();
              break;
            case 'edit_lock':
              editUnlocked = msg.payload.unlocked;
              render();
              break;
          }
        });

        hostConn.on('close', () => {
          showRoomStatus('انقطع الاتصال');
          hostConn = null;
          clearRoomSession();
        });

        setTimeout(() => {
          if (!hostConn || !hostConn.open) {
            document.getElementById('joinSpinner').style.display = 'none';
            document.getElementById('joinError').textContent = 'لم يتم العثور على الغرفة، تأكد من الرمز والإنترنت';
            if (peer) peer.destroy();
          }
        }, 10000);
      });
    }

      }
      connections = [];

      isHost = false;
      roomCode = '';

    // ── Firebase room implementation ──
    function createRoomFirebase() {
      if (!window.FB) { document.getElementById('connectedCount').textContent = 'Firebase غير متوفر'; return; }
      roomCode = genRoomCode();
      isHost = true; roomMode = 'firebase';
      document.getElementById('roomModalTitle').textContent = 'غرفة جديدة';
      document.getElementById('roomCreateView').style.display = '';
      document.getElementById('roomJoinView').style.display = 'none';
      document.getElementById('roomCodeDisplay').textContent = 'F-' + roomCode;
      const joinUrl = window.location.href.split('?')[0] + '?room=F-' + roomCode;
      const qrBox = document.getElementById('qrBox'); qrBox.innerHTML = '';
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      new QRCode(qrBox, { text: joinUrl, width: 160, height: 160, colorDark: isDark ? '#E8E4DC' : '#1A2744', colorLight: isDark ? '#1A1A2E' : '#F5F0E6', correctLevel: QRCode.CorrectLevel.M });
      if (!document.getElementById('roomModal').classList.contains('open')) {
        pushOverlay('roomModal');
        document.getElementById('roomModal').classList.add('open');
      }
      editUnlocked = false;
      showRoomStatus('غرفة F-' + roomCode + ' • جاري الاتصال...');

      const FB = window.FB;
      const roomRef = FB.ref(FB.db, 'rooms/' + roomCode);
      FB.set(roomRef, {
        host: true, createdAt: FB.serverTimestamp(),
        state: getStatePayload(), editUnlocked: false, presence: {}
      }).then(() => {
        FB.onDisconnect(roomRef).remove();
        fbUnsubState = FB.onValue(FB.ref(FB.db, 'rooms/' + roomCode + '/presence'), snap => {
          const presence = snap.val() || {};
          const count = Object.keys(presence).length;
          const arabic = count.toLocaleString('ar-SA');
          document.getElementById('connectedCount').textContent = arabic + ' متصلين';
          showRoomStatus('غرفة F-' + roomCode + ' • معزّب • ' + arabic + ' متصلين');
        });
        fbUnsubMsgs = FB.onValue(FB.ref(FB.db, 'rooms/' + roomCode + '/messages'), snap => {
          const msgs = snap.val() || {};
          Object.keys(msgs).forEach(k => {
            const msg = msgs[k];
            if (!editUnlocked) return;
            if (msg.type === 'round_added') {
              const result = StateManager.addRound(appState, msg.bunt, msg.meta || {});
              render();
              checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
              broadcastState();
            }
            FB.remove(FB.ref(FB.db, 'rooms/' + roomCode + '/messages/' + k));
          });
        });
        showRoomStatus('غرفة F-' + roomCode + ' • معزّب • ٠ متصلين');
      }).catch(err => {
        console.error(err);
        document.getElementById('connectedCount').textContent = 'فشل الاتصال بـ Firebase';
      });
    }

    function doJoinRoomFirebase(code) {
      if (!window.FB) { document.getElementById('joinError').textContent = 'Firebase غير متوفر'; return; }
      document.getElementById('joinError').textContent = '';
      document.getElementById('joinSpinner').style.display = '';
      isHost = false; roomCode = code; roomMode = 'firebase';
      const FB = window.FB;
      const roomRef = FB.ref(FB.db, 'rooms/' + code);
      FB.onValue(roomRef, snap => {
        const data = snap.val();
        if (!data) {
          document.getElementById('joinSpinner').style.display = 'none';
          document.getElementById('joinError').textContent = 'الغرفة غير موجودة';
          return;
        }
        if (!fbMyId) {
          fbMyId = Math.random().toString(36).substring(2, 10);
          const presRef = FB.ref(FB.db, 'rooms/' + code + '/presence/' + fbMyId);
          FB.set(presRef, { joinedAt: FB.serverTimestamp() });
          FB.onDisconnect(presRef).remove();
          document.getElementById('joinSpinner').style.display = 'none';
          closeRoomModal();
          showRoomStatus('غرفة F-' + code + ' • متصل');
        }
        if (data.state) { applyStatePayload(data.state); }
        editUnlocked = !!data.editUnlocked;
        render();
      }, err => {
        console.error(err);
        document.getElementById('joinSpinner').style.display = 'none';
        document.getElementById('joinError').textContent = 'فشل الاتصال بـ Firebase';
      });
      fbUnsubState = () => {};
    }

    function getStatePayload() {
      return {
        session: appState.session,
        currentGame: appState.currentGame
      };
    }

    function applyStatePayload(payload) {
      appState.session = payload.session;
      appState.currentGame = payload.currentGame;
      StateManager.save(appState);
    }

    function broadcastState() {
      if (roomMode === 'firebase' && window.FB && roomCode) {
        const FB = window.FB;
        if (isHost) {
          FB.set(FB.ref(FB.db, 'rooms/' + roomCode + '/state'), getStatePayload()).catch(() => {});
        } else {
          const rounds = appState.currentGame.rounds;
          const lastRound = rounds[rounds.length - 1];
          if (lastRound) {
            const msgRef = FB.push(FB.ref(FB.db, 'rooms/' + roomCode + '/messages'));
            FB.set(msgRef, { type: 'round_added', bunt: lastRound.bunt, meta: lastRound }).catch(() => {});
          }
        }
        return;
      }
      if (!isHost) {
        if (hostConn && hostConn.open) {
          const rounds = appState.currentGame.rounds;
          const lastRound = rounds[rounds.length - 1];
          if (lastRound) {
            hostConn.send({
              type: 'round_added',
              payload: { bunt: lastRound.bunt, meta: lastRound }
            });
          }
        }
        return;
      }

      const payload = { type: 'state_sync', payload: getStatePayload() };
      connections.forEach(c => {
        if (c.open) c.send(payload);
      });
    }
    // ── Sayings Engine ──────────────────────────────────────────

    const SAYINGS = {
      gameWin1:     'أنزل ثانية',
      tied11:       'افصلها!',
      sweep20:      'نظيفة!',
      deciderWin:   'فصلها!',
      closeTo152:   'قربت.. حسمها!',
      neckAndNeck:  'كتف بكتف',
      comeback:     'رجعوا!',
      blowout:      'مسح فيهم الأرض'
    };

    let sayingTimeout = null;

    function showSaying(text) {
      const el = document.getElementById('saying');
      el.textContent = text;
      el.style.opacity = '';
      el.classList.add('visible');
      clearTimeout(sayingTimeout);
      sayingTimeout = setTimeout(() => el.classList.remove('visible'), 4000);
    }

    function hideSaying() {
      const el = document.getElementById('saying');
      el.classList.remove('visible');
      clearTimeout(sayingTimeout);
    }

    function checkSayings(event) {
      const { currentGame, session } = appState;
      const score = currentGame.score;

      if (event === 'gameOver') {
        const wLana = session.wins.lana;
        const wLahum = session.wins.lahum;

        // Session sweep (2-0)
        if ((wLana === 2 && wLahum === 0) || (wLahum === 2 && wLana === 0)) {
          showSaying(SAYINGS.sweep20);
          return;
        }
        // Decider win (2-1)
        if ((wLana === 2 && wLahum === 1) || (wLahum === 2 && wLana === 1)) {
          showSaying(SAYINGS.deciderWin);
          return;
        }
        // Tied 1-1
        if (wLana === 1 && wLahum === 1) {
          showSaying(SAYINGS.tied11);
          return;
        }
        // First game won (1-0)
        const totalGames = wLana + wLahum;
        if (totalGames === 1) {
          showSaying(SAYINGS.gameWin1);
          return;
        }

        // Blowout check on the last finished game
        const lastGame = session.games[session.games.length - 1];
        if (lastGame) {
          const loserScore = Math.min(lastGame.finalScore.lana, lastGame.finalScore.lahum);
          if (loserScore < 50) {
            showSaying(SAYINGS.blowout);
            return;
          }
        }
        return;
      }

      if (event === 'roundEnd') {
        // Comeback: a team that was behind now leads
        const rounds = currentGame.rounds;
        if (rounds.length >= 2) {
          const lastRound = rounds[rounds.length - 1];
          const prevLana = score.lana - lastRound.bunt.lana;
          const prevLahum = score.lahum - lastRound.bunt.lahum;
          const wasLeading = prevLana > prevLahum ? 'lana' : (prevLahum > prevLana ? 'lahum' : null);
          const nowLeading = score.lana > score.lahum ? 'lana' : (score.lahum > score.lana ? 'lahum' : null);
          if (wasLeading && nowLeading && wasLeading !== nowLeading) {
            showSaying(SAYINGS.comeback);
            return;
          }
        }

        // Close to 152
        if (score.lana >= 130 || score.lahum >= 130) {
          showSaying(SAYINGS.closeTo152);
          return;
        }

        // Neck and neck
        if (score.lana > 20 && score.lahum > 20 && Math.abs(score.lana - score.lahum) <= 10) {
          showSaying(SAYINGS.neckAndNeck);
          return;
        }
      }
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = '';
    });
    function installPWA() {
      if (!deferredPrompt) return;

        deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
      });

    // ── Screen Wake Lock & Dim ────────────────────────────────
    (function() {
      let wakeLock = null;
      const DIM_DELAY = 15000;
      let dimTimer = null;

      // Dim overlay
      const dimOverlay = document.createElement('div');
      dimOverlay.id = 'dimOverlay';
      dimOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:250;pointer-events:none;opacity:0;transition:opacity 0.8s ease';
      document.body.appendChild(dimOverlay);

      function dim() { dimOverlay.style.opacity = '1'; }
      function undim() { dimOverlay.style.opacity = '0'; resetDimTimer(); }
      function resetDimTimer() {
        clearTimeout(dimTimer);
        dimTimer = setTimeout(dim, DIM_DELAY);
      }

      // Listen for any interaction
      ['pointerdown', 'pointermove', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
        document.addEventListener(evt, undim, { passive: true });
      });
      resetDimTimer();

      // Wake Lock
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
          }
        } catch(e) {}
      }
      requestWakeLock();
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') requestWakeLock();
      });
    })();

    // ── Theme Manager ───────────────────────────────────────────
    function getPreferredTheme() {
      return 'light';
    }

    const SVG_MOON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    const SVG_SUN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    const SVG_CHECK = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').innerHTML = theme === 'dark' ? SVG_SUN : SVG_MOON;
      const themeLabel = document.getElementById('themeLabel');
      if (themeLabel) themeLabel.innerHTML = theme === 'dark' ? SVG_SUN : SVG_MOON;
      const themeName = document.getElementById('themeName');
      if (themeName) themeName.textContent = theme === 'dark' ? 'الوضع الفاتح' : 'الوضع الداكن';
      localStorage.setItem('baloot_theme', theme);
      const meta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (meta) meta.content = theme === 'dark' ? '#1A1A2E' : '#722F37';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    async function hardReset() {
      closeMenu();
      const ok = await appConfirm('سيتم تحديث التطبيق للنسخة الأحدث. النتائج الحالية محفوظة.');
      if (!ok) return;
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) { console.warn(e); }
      location.reload();
    }


    // ── History Management (back button) ──────────────────────
    function pushOverlay(id) {
      history.pushState({ overlay: id }, '');
    }
    window.addEventListener('popstate', function(e) {
      const state = e.state;
      // Close any open overlay when back is pressed
      if (document.getElementById('menuOverlay').classList.contains('open')) {
        document.getElementById('menuOverlay').classList.remove('open');
        document.getElementById('sideMenu').classList.remove('open');
        return;
      }
      if (document.getElementById('roomModal').classList.contains('open')) {
        document.getElementById('roomModal').classList.remove('open');
        return;
      }
      // Close any app-dialog
      const dlg = document.querySelector('.app-dialog-overlay');
      if (dlg) { dlg.remove(); return; }
    });

    function openMenu() {
      pushOverlay('menu');
      document.getElementById('menuOverlay').classList.add('open');
      document.getElementById('sideMenu').classList.add('open');
    }

    function closeMenu() {
      document.getElementById('menuOverlay').classList.remove('open');
      document.getElementById('sideMenu').classList.remove('open');
    }

    // Apply theme on load
    applyTheme(getPreferredTheme());

    // Initial render
    if (appState.settings.mode === 'advanced') {
      resetAdvancedForm();
    }
    updateScrollLock(appState.settings.mode);
    render();



    // Auto-join room from URL parameter or reconnect from sessionStorage
    (function() {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam) {
        const isFB = roomParam.charAt(0) === 'F' && roomParam.charAt(1) === '-';
        const validLen = isFB ? (roomParam.length === 6) : (roomParam.length === 4);
        if (validLen) {
          window.history.replaceState({}, '', window.location.pathname);
          setTimeout(() => {
            document.getElementById('joinCodeInput').value = roomParam.toUpperCase();
            doJoinRoom();
          }, 500);
          return;
        }
      }
      // Reconnect to previous room after refresh
      try {
        const saved = JSON.parse(sessionStorage.getItem('baloot_room'));
        if (saved && saved.code && saved.code.length === 4) {
          setTimeout(() => {
            if (saved.role === 'host') {
              createRoom();
              // Override the random code with the saved one — destroy and recreate
              if (peer) peer.destroy();
              roomCode = saved.code;
              document.getElementById('roomCodeDisplay').textContent = roomCode;
              const joinUrl = window.location.href.split('?')[0] + '?room=' + roomCode;
              const qrBox = document.getElementById('qrBox');
              qrBox.innerHTML = '';
              const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
              new QRCode(qrBox, { text: joinUrl, width: 160, height: 160, colorDark: isDark ? '#E8E4DC' : '#1A2744', colorLight: isDark ? '#1A1A2E' : '#F5F0E6', correctLevel: QRCode.CorrectLevel.M });
              isHost = true;
              peer = new Peer(PEER_PREFIX + roomCode.toLowerCase(), {
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
              });
              peer.on('open', () => {
                document.getElementById('connectedCount').textContent = 'جاهز • ٠ متصلين';
                showRoomStatus('غرفة ' + roomCode + ' • معزّب • ٠ متصلين');
              });
              peer.on('connection', conn => {
                connections.push(conn);
                updateConnCount();
                conn.on('data', msg => handleHostMessage(conn, msg));
                conn.on('close', () => { connections = connections.filter(c => c !== conn); updateConnCount(); });
                conn.on('open', () => {
                  conn.send({ type: 'state_sync', payload: getStatePayload() });
                  conn.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
                });
              });
              peer.on('error', err => { console.error('Peer error:', err); clearRoomSession(); });
              closeRoomModal();
            } else {
              document.getElementById('joinCodeInput').value = saved.code;
              doJoinRoom();
            }
          }, 500);
        }
      } catch(e) {}
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
