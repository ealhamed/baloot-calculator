<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#722F37">
  <title>حاسبة بلوت - الديوانية</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F0E6;
      --burgundy: #722F37;
      --gold: #C9A227;
      --navy: #1A2744;
      --text: #1D1E20;
      --cream: #F5F0E6;
      --gold-text: #8B7318;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html.no-scroll, html.no-scroll body { overflow: hidden; height: 100%; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overscroll-behavior: contain;
      touch-action: manipulation;
    }

    button {
      font-family: 'Cairo', sans-serif;
      background: var(--burgundy);
      color: var(--cream);
      border: none;
      border-radius: 28px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }

    button:focus-visible, .toggle-btn:focus-visible, .stepper-btn:focus-visible {
      outline: 2px solid var(--burgundy);
      outline-offset: 2px;
    }
    .input-field:focus-visible {
      border-color: var(--burgundy);
      box-shadow: 0 0 0 2px rgba(114, 47, 55, 0.2);
    }

    .card {
      background: var(--cream);
      border: 1px solid var(--navy);
      border-radius: 20px;
      padding: 12px 16px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      text-align: center;
      padding: 12px 16px 4px;
      position: relative;
    }
    .header h1 {
      color: var(--gold-text);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0;
      background: var(--navy);
      border-radius: 20px;
      padding: 3px;
      width: fit-content;
      margin: 8px auto 0;
    }
    .mode-toggle button {
      background: transparent;
      color: var(--cream);
      padding: 6px 18px;
      font-size: 13px;
      border-radius: 18px;
      opacity: 0.6;
    }
    .mode-toggle button.active {
      background: var(--burgundy);
      opacity: 1;
    }
    .scoreboard {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 16px 8px;
    }
    .team { text-align: center; flex: 1; }
    .team-label { color: var(--gold-text); font-size: 18px; font-weight: 700; }
    .team-score { color: var(--navy); font-size: 52px; font-weight: 700; line-height: 1.1; }
    .score-divider { color: var(--navy); font-size: 28px; opacity: 0.3; padding: 0 4px; }
    .progress-wrap { padding: 0 24px 8px; display: flex; gap: 8px; transition: opacity 0.3s; }
    .progress-wrap.empty { opacity: 0.15; }
    .progress-bar { flex: 1; height: 6px; background: rgba(26, 39, 68, 0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--burgundy); border-radius: 3px; transition: width 0.4s ease; }
    .progress-fill.lahum { background: var(--navy); }
    .rounds-section { padding: 0 16px; }
    .rounds-label { color: var(--navy); font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .rounds-list { display: flex; flex-direction: column; gap: 8px; max-height: 35vh; overflow-y: auto; padding-bottom: 8px; scroll-behavior: smooth; }
    .round-card { background: var(--cream); border: 1px solid rgba(26, 39, 68, 0.15); border-radius: 20px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; }
    .round-num { color: var(--navy); font-weight: 700; min-width: 24px; }
    .round-type { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; color: var(--cream); }
    .round-type.sun { background: var(--gold); }
    .round-type.hokm { background: var(--navy); }
    .round-scores { font-weight: 600; color: var(--text); }
    .rs-label { font-size: 10px; font-weight: 600; opacity: 0.4; }
    .saying { text-align: center; color: var(--gold-text); font-size: 16px; font-weight: 700; padding: 4px 16px; min-height: 0; opacity: 0; transition: opacity 0.5s ease; }
    .saying.visible { min-height: 32px; }
    .saying.visible { opacity: 1; }
    .actions { padding: 8px 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-primary { width: 100%; max-width: 200px; padding: 10px 24px; font-size: 16px; }
    .btn-secondary { background: transparent; color: var(--navy); border: 1px solid rgba(26,39,68,0.2); font-size: 12px; padding: 6px 16px; opacity: 0.6; }
    .session-bar { text-align: center; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--navy); opacity: 0.5; }
    .room-actions { display: flex; justify-content: center; gap: 6px; padding: 2px 16px 8px; }
    .room-actions button { font-size: 11px; padding: 6px 12px; background: var(--navy); opacity: 0.7; }
    .bottom-pad { height: env(safe-area-inset-bottom, 16px); }
    .footer-divider { border: none; border-top: 1px solid rgba(26,39,68,0.08); margin: 8px 32px; }

    /* ── Modal ──────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 39, 68, 0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 430px;
      padding: 24px 20px env(safe-area-inset-bottom, 20px);
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title {
      color: var(--navy);
      font-size: 20px;
      font-weight: 700;
    }
    .modal-close {
      background: transparent;
      color: var(--navy);
      font-size: 24px;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .input-group { margin-bottom: 16px; }
    .input-label { display: block; color: var(--gold-text); font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .input-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(26, 39, 68, 0.2);
      border-radius: 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      background: white;
      color: var(--navy);
      outline: none;
      -moz-appearance: textfield;
    }
    .input-field::-webkit-outer-spin-button,
    .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-field:focus { border-color: var(--burgundy); }

    .input-row { display: flex; gap: 12px; }
    .input-row .input-group { flex: 1; }

    .toggle-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .toggle-btn {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      background: transparent;
      color: var(--navy);
      border: 1px solid rgba(26, 39, 68, 0.2);
      border-radius: 16px;
      opacity: 0.6;
    }
    .toggle-btn.active {
      background: var(--burgundy);
      color: var(--cream);
      border-color: var(--burgundy);
      opacity: 1;
    }

    .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
    .checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--burgundy); }
    .checkbox-label { font-size: 14px; color: var(--text); }
    .checkbox-value { margin-right: auto; font-size: 13px; color: var(--gold-text); font-weight: 700; }

    .stepper-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .stepper-label { font-size: 13px; color: var(--text); }
    .stepper-controls { display: flex; align-items: center; gap: 8px; }
    .stepper-btn {
      width: 36px; height: 36px; border-radius: 50%; padding: 0;
      font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
      background: var(--navy); color: var(--cream);
    }
    .stepper-count { font-size: 16px; font-weight: 700; color: var(--navy); min-width: 20px; text-align: center; }

    .clarify-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      background: var(--navy);
      color: var(--cream);
      border-radius: 14px;
      min-width: 80px;
    }
    .clarify-btn:active { opacity: 0.7; }

    .bunt-stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .bunt-step-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      padding: 0;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      color: var(--cream);
    }
    .bunt-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      min-width: 40px;
      text-align: center;
    }

    .preview-bar {
      background: var(--navy);
      color: var(--cream);
      border-radius: 16px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-around;
      margin: 16px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .section-divider { border: none; border-top: 1px solid rgba(26, 39, 68, 0.1); margin: 16px 0; }

    .kabout-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(114, 47, 55, 0.05);
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .kabout-label { font-size: 16px; font-weight: 700; color: var(--burgundy); }

    .switch { position: relative; width: 48px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 28px;
      transition: 0.3s;
      cursor: pointer;
    }
    .switch .slider:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      bottom: 3px;
      right: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: var(--burgundy); }
    .switch input:checked + .slider:before { transform: translateX(-20px); }

    .geo-divider {
      text-align: center;
      padding: 8px 0;
      opacity: 0.12;
    }
    .geo-divider svg {
      width: 80px;
      height: 16px;
    }

    .score-entry {
      padding: 0 16px 8px;
    }
    .score-entry .input-group { margin-bottom: 8px; }
    .score-entry .input-label { font-size: 14px; margin-bottom: 4px; }

    .game-over-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 39, 68, 0.85);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .game-over-overlay h2 {
      font-size: 28px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .game-over-overlay .winner-text {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .stats-card {
      background: rgba(245,240,230,0.1);
      border-radius: 16px;
      padding: 12px 16px;
      width: 100%;
      max-width: 300px;
      backdrop-filter: blur(4px);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      color: var(--cream);
      border-bottom: 1px solid rgba(245,240,230,0.08);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row span:first-child { opacity: 0.6; }
    .stat-row span:last-child { font-weight: 700; }
    /* ── Button Flash ──────────────────────── */
    .btn-flash {
      animation: flash 0.3s ease;
    }
    @keyframes flash {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── Theme Toggle ──────────────────────── */
    /* ── Burger Menu ─────────────────────────── */
    .burger-btn {
      position: absolute;
      right: 16px;
      top: 12px;
      background: rgba(26,39,68,0.08);
      font-size: 20px;
      padding: 4px;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy);
      line-height: 1;
    }
    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 39, 68, 0.5);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .menu-overlay.open { opacity: 1; pointer-events: auto; }
    .side-menu {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100%;
      background: var(--bg);
      z-index: 151;
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 24px 20px;
      overflow-y: auto;
      box-shadow: -4px 0 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .side-menu.open { right: 0; }
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .menu-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
    }
    .menu-section {
      margin-bottom: 20px;
    }
    .menu-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-text);
      margin-bottom: 8px;
      opacity: 0.7;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(26,39,68,0.06);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      background: none;
      border-radius: 0;
      width: 100%;
      text-align: right;
    }
    .menu-item:active { opacity: 0.6; }
    .menu-footer {
      margin-top: auto;
      text-align: center;
      font-size: 11px;
      color: var(--navy);
      opacity: 0.3;
      padding-top: 16px;
    }
    [data-theme="dark"] .side-menu {
      box-shadow: -4px 0 20px rgba(0,0,0,0.4);
    }
    .theme-toggle {
      position: absolute;
      left: 16px;
      top: 12px;
      background: rgba(26,39,68,0.08);
      font-size: 18px;
      padding: 4px;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: none; /* hidden - moved to menu */
      align-items: center;
      justify-content: center;
    }

    /* ── Dark Mode ─────────────────────────── */
    [data-theme="dark"] {
      --bg: #1A1A2E;
      --burgundy: #A84450;
      --gold: #D4AF37;
      --gold-text: #D4AF37;
      --navy: #E8E4DC;
      --text: #E8E4DC;
      --cream: #1A1A2E;
      --card-bg: #252542;
      --input-bg: #2A2A4A;
      --input-border: rgba(232, 228, 220, 0.15);
      --overlay: rgba(0, 0, 0, 0.7);
    }
    [data-theme="dark"] .input-field {
      background: var(--input-bg);
      border-color: var(--input-border);
      color: var(--text);
    }
    [data-theme="dark"] .round-card {
      background: var(--card-bg);
      border-color: var(--input-border);
    }
    [data-theme="dark"] .modal {
      background: var(--bg);
    }
    [data-theme="dark"] .modal-overlay {
      background: var(--overlay);
    }
    [data-theme="dark"] .toggle-btn {
      border-color: var(--input-border);
    }
    [data-theme="dark"] .progress-bar {
      background: rgba(232, 228, 220, 0.15);
    }
    [data-theme="dark"] .progress-fill.lahum {
      background: #6B8EC4;
    }
    [data-theme="dark"] .kabout-toggle {
      background: rgba(168, 68, 80, 0.1);
    }
    [data-theme="dark"] .switch .slider {
      background: #555;
    }
    [data-theme="dark"] .btn-secondary {
      color: var(--text);
      border-color: rgba(232, 228, 220, 0.2);
    }
    [data-theme="dark"] .game-over-overlay {
      background: rgba(0, 0, 0, 0.85);
    }

    .logo-wrap { text-align: center; margin: 0 auto 4px; }
    [data-theme="dark"] .logo-wrap img {
      filter: brightness(1.8) contrast(1.1);
    }

    /* ── Reduced Motion ────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Decorative suit accents -->

  <main>
    <div id="roomStatus" style="display:none;background:var(--navy);padding:6px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <span id="roomStatusText" style="font-size:11px;color:var(--cream);font-weight:600"></span>
        <div style="display:flex;gap:4px;align-items:center">
          <button id="editToggleBar" style="font-size:9px;padding:3px 8px;background:transparent;border:1px solid rgba(245,240,230,0.3);color:var(--cream);border-radius:10px;display:none" onclick="toggleEditFromBar()">تعديل: مقفل</button>
          <button style="font-size:10px;padding:3px 8px;background:var(--burgundy);border-radius:10px" onclick="shareRoom()">مشاركة</button>
          <button style="font-size:10px;padding:3px 8px;background:transparent;border:1px solid rgba(245,240,230,0.3);color:var(--cream);border-radius:10px" onclick="leaveRoom()">خروج</button>
        </div>
      </div>
    </div>
    <div class="header">
      <div class="logo-wrap"><img src="logo.png" alt="الديوانية" style="height:72px"></div>
      <h1>حاسبة بلوت</h1>
      <div class="mode-toggle">
        <button id="btnSimple" class="active" onclick="setMode('simple')">بسيط</button>
        <button id="btnAdvanced" onclick="setMode('advanced')">تفصيلي</button>
      </div>
      <button class="burger-btn" onclick="openMenu()" aria-label="القائمة">☰</button>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="تغيير المظهر" id="themeToggle">🌙</button>
    </div>

    <div class="scoreboard">
      <div class="team">
        <div class="team-label">لنا</div>
        <div class="team-score" id="scoreLana">0</div>
      </div>
      <div class="score-divider">-</div>
      <div class="team">
        <div class="team-label">لهم</div>
        <div class="team-score" id="scoreLahum">0</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progLana" style="width:0%"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill lahum" id="progLahum" style="width:0%"></div>
      </div>
    </div>

    <!-- Inline Score Entry -->
    <div class="score-entry" id="scoreEntry">
      <!-- Simple Mode Form -->
      <div id="simpleForm">
        <div class="input-row">
          <div class="input-group">
            <label class="input-label">لنا</label>
            <input type="number" class="input-field" id="simpleLana" min="0" inputmode="numeric" placeholder="٠">
          </div>
          <div class="input-group">
            <label class="input-label">لهم</label>
            <input type="number" class="input-field" id="simpleLahum" min="0" inputmode="numeric" placeholder="٠">
          </div>
        </div>
        <div style="text-align:center;padding-top:8px">
          <button class="btn-primary" style="max-width:200px" onclick="submitSimple()">تأكيد</button>
        </div>
        <!-- Clarification MCQ area -->
        <div id="clarifyArea" style="display:none">
          <div id="clarifyQuestion" style="text-align:center;font-size:14px;font-weight:700;color:var(--navy);padding:8px 0"></div>
          <div id="clarifyOptions" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:4px 0"></div>
        </div>
      </div>

      <!-- Advanced Mode Form -->
      <div id="advancedForm" style="display:none">
        <!-- Row 1: Type & Buyer -->
        <div class="input-row" style="margin-bottom:12px">
          <div class="input-group" style="margin-bottom:0">
            <label class="input-label" style="font-size:13px">نوع اللعب</label>
            <div class="toggle-group" style="margin-bottom:0">
              <button class="toggle-btn active" id="advTypeSun" onclick="setAdvType('sun')">صن</button>
              <button class="toggle-btn" id="advTypeHokm" onclick="setAdvType('hokm')">حكم</button>
            </div>
          </div>
          <div class="input-group" style="margin-bottom:0">

  <script
    src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"
    integrity="sha384-nlUQ8ZqCbvStErob+biJNzSgltf6urV3VGqhfIfzhmg9RXmpeRm76ELw0pYnKlTR"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
    integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU"
    crossorigin="anonymous"
  ></script>
  <script>
    // ── Scoring Engine ──────────────────────────────────────────

    const BalootScoring = {
      PROJECT_VALUES: {
        sira:    { sun: 4,  hokm: 2 },
        '50':    { sun: 10, hokm: 5 },
        '100':   { sun: 20, hokm: 10 },
        '400':   { sun: 40, hokm: 10 },
        baloot:  { sun: 0,  hokm: 2 }
      },

      TOTAL_RAW: { sun: 260, hokm: 162 },
      KABOUT_BUNT: { sun: 44, hokm: 25 },
      FAIL_THRESHOLD: { sun: 66, hokm: 81 },
      TOTAL_BUNT: { sun: 26, hokm: 16 },

      rawToBunt(raw, type) {
        if (type === 'sun') {
          const remainder = raw % 10;
          let rounded;
          if (remainder === 5) {
            rounded = raw;
          } else if (remainder < 5) {
            rounded = raw - remainder;
          } else {
            rounded = raw + (10 - remainder);
          }
          return (rounded * 2) / 10;
        } else {
          return Math.floor(raw / 10);
        }
      },

      calcProjects(projects, type, multiplier) {
        let total = 0;
        // projects can be an array of keys ['sira','50'] or an object with counts {sira:2, '50':1}
        if (Array.isArray(projects)) {
          for (const p of projects) {
            const val = this.PROJECT_VALUES[p]?.[type] || 0;
            total += (p === 'baloot') ? val : val * multiplier;
          }
        } else {
          for (const [p, count] of Object.entries(projects)) {
            const val = this.PROJECT_VALUES[p]?.[type] || 0;
            const c = count || 0;
            total += (p === 'baloot') ? val * c : val * multiplier * c;
          }
        }
        return total;
      },

      calculateRound(round) {
        const { type, buyer, multiplier, kabout, kaboutWinner, projects, rawPoints } = round;
        const mult = { normal: 1, double: 2, triple: 3, four: 4, coffee: 1 }[multiplier] || 1;
        const opponent = buyer === 'lana' ? 'lahum' : 'lana';

        if (multiplier === 'coffee') {
          return { lana: 0, lahum: 0, gameOver: true, coffeeWinner: opponent };
        }

        if (kabout) {
          const winner = kaboutWinner || buyer;
          const loser = winner === 'lana' ? 'lahum' : 'lana';
          const kaboutBunt = this.KABOUT_BUNT[type] * mult;
          const projBunt = this.calcProjects(projects[winner] || [], type, mult);
          const result = { lana: 0, lahum: 0, gameOver: false };
          result[winner] = kaboutBunt + projBunt;
          return result;
        }

        const buntLana = this.rawToBunt(rawPoints.lana, type);
        const buntLahum = this.rawToBunt(rawPoints.lahum, type);

        const buyerFailed = rawPoints[buyer] < this.FAIL_THRESHOLD[type];

        let result = { lana: 0, lahum: 0, gameOver: false };

        if (buyerFailed) {
          result[opponent] = this.TOTAL_BUNT[type] * mult;
          result[opponent] += this.calcProjects(projects[opponent] || [], type, mult);
        } else {
          result.lana = buntLana * mult;
          result.lahum = buntLahum * mult;
          result.lana += this.calcProjects(projects.lana || [], type, mult);
          result.lahum += this.calcProjects(projects.lahum || [], type, mult);
        }

        return result;
      }
    };

    // ── State Manager ───────────────────────────────────────────

    const StateManager = {
      STORAGE_KEY: 'baloot_state',

      _defaultState() {
        return {
          session: {
            wins: { lana: 0, lahum: 0 },
            games: []
          },
          currentGame: {
            rounds: [],
            score: { lana: 0, lahum: 0 }
          },
          settings: {
            mode: 'simple'
          }
        };
      },

      load() {
        try {
          const raw = localStorage.getItem(this.STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const def = this._defaultState();
            return {
              session: parsed.session || def.session,
              currentGame: parsed.currentGame || def.currentGame,
              settings: parsed.settings || def.settings
            };
          }
        } catch (e) { /* ignore corrupt data */ }
        return this._defaultState();
      },

      save(state) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
      },

      addRound(state, bunt, roundMeta) {
        const round = {
          ...roundMeta,
          bunt: { ...bunt },
          roundNum: state.currentGame.rounds.length + 1
        };
        state.currentGame.rounds.push(round);
        state.currentGame.score.lana += bunt.lana;
        state.currentGame.score.lahum += bunt.lahum;

        if (state.currentGame.score.lana >= 152 || state.currentGame.score.lahum >= 152) {
          return this._endGame(state);
        }
        this.save(state);
        return { gameOver: false };
      },

      handleCoffee(state, winner) {
        const loser = winner === 'lana' ? 'lahum' : 'lana';
        state.currentGame.rounds.push({
          type: 'coffee',
          bunt: { lana: 0, lahum: 0 },
          roundNum: state.currentGame.rounds.length + 1,
          coffeeWinner: winner
        });
        return this._endGame(state, winner);
      },

      _endGame(state, forceWinner) {
        const winner = forceWinner ||
          (state.currentGame.score.lana >= 152 ? 'lana' : 'lahum');

        const finishedGame = {
          rounds: [...state.currentGame.rounds],
          winner,
          finalScore: { ...state.currentGame.score }
        };
        state.session.games.push(finishedGame);
        state.session.wins[winner]++;

        const sessionOver = state.session.wins.lana >= 2 || state.session.wins.lahum >= 2;

        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);

        return { gameOver: true, winner, sessionOver };
      },

      newGame(state) {
        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);
      },

      newSession(state) {
        state.session = { wins: { lana: 0, lahum: 0 }, games: [] };
        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);
      },

      setMode(state, mode) {
        state.settings.mode = mode;
        this.save(state);
      },

      undoLastRound(state) {
        const rounds = state.currentGame.rounds;
        if (rounds.length === 0) return;
        const last = rounds.pop();
        state.currentGame.score.lana -= last.bunt.lana;
        state.currentGame.score.lahum -= last.bunt.lahum;
        this.save(state);
      }
    };

    // ── UI Renderer ─────────────────────────────────────────────

    let appState = StateManager.load();

    function render() {
      const { currentGame, session, settings } = appState;

      document.getElementById('scoreLana').textContent = currentGame.score.lana;
      document.getElementById('scoreLahum').textContent = currentGame.score.lahum;

      const progLana = Math.min((currentGame.score.lana / 152) * 100, 100);
      const progLahum = Math.min((currentGame.score.lahum / 152) * 100, 100);
      document.getElementById('progLana').style.width = progLana + '%';
      document.getElementById('progLahum').style.width = progLahum + '%';
      document.querySelector('.progress-wrap').classList.toggle('empty', currentGame.score.lana === 0 && currentGame.score.lahum === 0);

      const list = document.getElementById('roundsList');
      list.innerHTML = currentGame.rounds.map(r => {
        if (r.type === 'coffee') {
          return `<div class="round-card">
            <span class="round-num">${r.roundNum}</span>
            <span class="round-type hokm">قهوة</span>
            <span class="round-scores">${r.coffeeWinner === 'lana' ? 'لنا' : 'لهم'} فاز</span>
          </div>`;
        }
        const typeClass = r.type === 'sun' ? 'sun' : 'hokm';
        const typeLabel = r.type === 'sun' ? 'صن' : (r.type === 'hokm' ? 'حكم' : '');
        return `<div class="round-card">
          <span class="round-num">${r.roundNum}</span>
          ${typeLabel ? `<span class="round-type ${typeClass}">${typeLabel}</span>` : ''}
          <span class="round-scores"><span class="rs-label">لنا</span> ${r.bunt.lana} - ${r.bunt.lahum} <span class="rs-label">لهم</span></span>
        </div>`;
      }).join('');

      document.getElementById('sessionBar').textContent =
        `لنا ${session.wins.lana} - ${session.wins.lahum} لهم`;

      document.getElementById('btnSimple').classList.toggle('active', settings.mode === 'simple');
      document.getElementById('btnAdvanced').classList.toggle('active', settings.mode === 'advanced');

      // Show correct inline form based on mode
      document.getElementById('simpleForm').style.display = settings.mode === 'simple' ? '' : 'none';
      document.getElementById('advancedForm').style.display = settings.mode === 'advanced' ? '' : 'none';

      // Show score entry or new game / session over button
      const gameJustEnded = session.games.length > 0 &&
        currentGame.rounds.length === 0 &&
        session.wins.lana < 2 && session.wins.lahum < 2;
      const sessionOver = session.wins.lana >= 2 || session.wins.lahum >= 2;

      document.getElementById('scoreEntry').style.display = (gameJustEnded || sessionOver) ? 'none' : '';
      document.getElementById('btnNewGame').style.display = gameJustEnded ? '' : 'none';
      document.getElementById('btnSessionOver').style.display = sessionOver ? '' : 'none';

      // Update scroll lock
      updateScrollLock(settings.mode);

      // Hide rounds section when empty
      const hasRounds = currentGame.rounds.length > 0;
      document.getElementById('roundsSection').style.display = hasRounds ? '' : 'none';

      // Show hint only when no rounds exist, clear it when rounds appear
      const sayingEl = document.getElementById('saying');
      if (currentGame.rounds.length === 0 && !sayingEl.classList.contains('visible')) {
        sayingEl.textContent = 'أدخل نتيجة أول جولة';
        sayingEl.style.opacity = '0.3';
      } else if (currentGame.rounds.length > 0 && !sayingEl.classList.contains('visible')) {
        sayingEl.textContent = '';
        sayingEl.style.opacity = '0';
      }

      // Hide session bar until at least one game is complete
      const hasGames = session.games.length > 0;
      document.getElementById('sessionBar').style.display = hasGames ? '' : 'none';

      // If connected as player and edit is locked, hide score entry
      if (hostConn && !editUnlocked) {
        document.getElementById('scoreEntry').style.display = 'none';
      }

      // Auto-scroll to latest round
      const roundsList = document.getElementById('roundsList');
      if (roundsList.lastChild) roundsList.lastChild.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function setMode(mode) {
      StateManager.setMode(appState, mode);
      document.getElementById('simpleForm').style.display = mode === 'simple' ? '' : 'none';
      document.getElementById('advancedForm').style.display = mode === 'advanced' ? '' : 'none';
      if (mode === 'advanced') {
        resetAdvancedForm();
      }
      updateScrollLock(mode);
      render();
    }

    function updateScrollLock(mode) {
      const hasRounds = appState.currentGame.rounds.length > 0;
      // Lock scroll in simple mode with no rounds (fresh state fits in one screen)
      if (mode === 'simple' && !hasRounds) {
        document.documentElement.classList.add('no-scroll');
      } else {
        document.documentElement.classList.remove('no-scroll');
      }
    }

    function confirmNewGame() {
      if (confirm('بدء لعبة جديدة؟')) {
        StateManager.newGame(appState);
        render();
        checkSayings('newGame');
      }
    }

    function confirmNewSession() {
      if (confirm('بدء صكة جديدة؟ سيتم مسح جميع النتائج')) {
        StateManager.newSession(appState);
        render();
        hideSaying();
      }
    }

    function undoRound() {
      if (appState.currentGame.rounds.length === 0) return;
      if (!confirm('تراجع عن آخر جولة؟')) return;
      StateManager.undoLastRound(appState);
      render();
      hideSaying();
      broadcastState();
    }

    // ── Modal Logic ─────────────────────────────────────────────

    let advState = { type: 'sun', buyer: 'lana', multiplier: 'normal', kaboutWinner: 'lana' };

    // ── Smart Score Interpreter ────────────────────────────────

    let pendingBunt = null; // { lana, lahum } waiting for clarification
    let pendingMeta = {};   // accumulated metadata from MCQ answers

    function submitSimple() {
      const lana = parseInt(document.getElementById('simpleLana').value) || 0;
      const lahum = parseInt(document.getElementById('simpleLahum').value) || 0;
      if (lana === 0 && lahum === 0) return;
      if (lana < 0 || lahum < 0) return;

      pendingBunt = { lana, lahum };
      pendingMeta = {};

      // Start interpreting
      interpretScore(lana, lahum);
    }

    function interpretScore(lana, lahum) {
      const total = lana + lahum;

      // Kabout detection
      if ((lana === 44 && lahum === 0) || (lahum === 44 && lana === 0)) {
        pendingMeta = { type: 'sun', kabout: true, buyer: lana === 44 ? 'lana' : 'lahum' };
        finishSimple();
        return;
      }
      if ((lana === 25 && lahum === 0) || (lahum === 25 && lana === 0)) {
        pendingMeta = { type: 'hokm', kabout: true, buyer: lana === 25 ? 'lana' : 'lahum' };
        finishSimple();
        return;
      }

      // Buyer failure: one team got 0, other got full total
      if (lana === 0 && (lahum === 26 || lahum === 16)) {
        pendingMeta.type = lahum === 26 ? 'sun' : 'hokm';
        pendingMeta.buyerFailed = true;
        askQuestion('من اشترى؟', [
          { label: 'لنا', value: 'lana' },
          { label: 'لهم', value: 'lahum' }
        ], (answer) => {
          pendingMeta.buyer = answer;
          finishSimple();
        });
        return;
      }
      if (lahum === 0 && (lana === 26 || lana === 16)) {
        pendingMeta.type = lana === 26 ? 'sun' : 'hokm';
        pendingMeta.buyerFailed = true;
        askQuestion('من اشترى؟', [
          { label: 'لنا', value: 'lana' },
          { label: 'لهم', value: 'lahum' }
        ], (answer) => {
          pendingMeta.buyer = answer;
          finishSimple();
        });
        return;
      }

      // Exact 16: can only be حكم, no projects
      if (total === 16) {
        pendingMeta.type = 'hokm';
        finishSimple();
        return;
      }

      // Total below 16: invalid
      if (total < 16) {
        askQuestion('المجموع أقل من ١٦ — تأكد من الأرقام', [
          { label: 'حسناً', value: 'ok' }
        ], () => { pendingBunt = null; pendingMeta = {}; });
        return;
      }

      // Total 17-25: can only be حكم with projects (صن base is always 26)
      if (total > 16 && total < 26) {
        pendingMeta.type = 'hokm';
        const hokmExcess = total - 16;
        const hokmProjects = decomposeProjects(hokmExcess, 'hokm');
        if (hokmProjects.length > 0) {
          resolveProjects(hokmExcess, 'hokm');
        } else {
          finishSimple();
        }
        return;
      }

      // Total >= 26: could be صن (with or without projects) OR حكم with projects
      if (total >= 26) {
        const sunExcess = total - 26;
        const hokmExcess = total - 16;
        const hokmProjects = decomposeProjects(hokmExcess, 'hokm');
        // Sun is valid if excess >= 0, hokm is valid if projects decompose
        const sunValid = sunExcess >= 0;
        const hokmValid = hokmProjects.length > 0;

        if (sunValid && hokmValid) {
          // Ambiguous — ask type first
          askQuestion('صن أو حكم؟', [
            { label: 'صن', value: 'sun' },
            { label: 'حكم', value: 'hokm' }
          ], (answer) => {
            pendingMeta.type = answer;
            if (answer === 'sun') {
              if (sunExcess === 0) {
                finishSimple(); // صن, no projects
              } else {
                resolveProjects(sunExcess, 'sun');
              }
            } else {
              resolveProjects(hokmExcess, 'hokm');
            }
          });
        } else if (sunValid) {
          pendingMeta.type = 'sun';
          if (sunExcess === 0) {
            finishSimple();
          } else {
            resolveProjects(sunExcess, 'sun');
          }
        } else if (hokmValid) {
          pendingMeta.type = 'hokm';
          resolveProjects(hokmExcess, 'hokm');
        } else {
          // Can't decompose — just record as-is
          finishSimple();
        }
        return;
      }

      finishSimple();
    }

    function decomposeProjects(excess, type) {
      // Find all possible project combinations that sum to the excess
      const vals = [];
      const projectDefs = [
        { key: 'sira', sun: 4, hokm: 2 },
        { key: '50', sun: 10, hokm: 5 },
        { key: '100', sun: 20, hokm: 10 },
        { key: '400', sun: 40, hokm: 10 },
        { key: 'baloot', sun: 0, hokm: 2 }
      ];
      const available = projectDefs.filter(p => p[type] > 0);

      const results = [];
      // Simple brute force with max 4 of each project
      function findCombos(remaining, startIdx, current) {
        if (remaining === 0) {
          results.push([...current]);
          return;
        }
        if (remaining < 0 || startIdx >= available.length) return;
        for (let count = 0; count <= 4; count++) {
          const used = available[startIdx][type] * count;
          if (used > remaining) break;
          if (count > 0) current.push({ key: available[startIdx].key, count, label: getProjectLabel(available[startIdx].key, type) });
          findCombos(remaining - used, startIdx + 1, current);
          if (count > 0) current.pop();
        }
        // Also try skipping this project
        if (results.length === 0 || current.length === 0) {
          findCombos(remaining, startIdx + 1, current);
        }
      }
      findCombos(excess, 0, []);
      return results;
    }

    function getProjectLabel(key, type) {
      const labels = { sira: 'سرا', '50': 'خمسين', '100': 'مية', '400': type === 'sun' ? 'أربعمية' : '٤ إكوات', baloot: 'بلوت' };
      return labels[key] || key;
    }

    function resolveProjects(excess, type) {
      const combos = decomposeProjects(excess, type);

      if (combos.length === 0) {
        finishSimple();
        return;
      }

      // Auto-assign projects to the team with the higher score
      const projTeam = pendingBunt.lana >= pendingBunt.lahum ? 'lana' : 'lahum';

      if (combos.length === 1) {
        // Only one possibility — auto-assign, no question needed
        pendingMeta.projects = { [projTeam]: comboToObj(combos[0]) };
        finishSimple();
        return;
      }

      // Multiple possibilities — ask which (max 4 options)
      const options = combos.slice(0, 4).map((combo, i) => {
        const desc = combo.map(p => (p.count > 1 ? p.count + '× ' : '') + p.label).join(' + ');
        return { label: desc, value: i };
      });

      askQuestion('أي مشاريع؟', options, (answer) => {
        pendingMeta.projects = { [projTeam]: comboToObj(combos[answer]) };
        finishSimple();
      });
    }

    function comboToObj(combo) {
      const obj = {};
      for (const p of combo) obj[p.key] = (obj[p.key] || 0) + p.count;
      return obj;
    }

    function askQuestion(question, options, callback) {
      const area = document.getElementById('clarifyArea');
      const qEl = document.getElementById('clarifyQuestion');
      const oEl = document.getElementById('clarifyOptions');

      qEl.textContent = question;
      oEl.innerHTML = options.map((opt, i) =>
        `<button class="clarify-btn" data-idx="${i}">${opt.label}</button>`
      ).join('');

      area.style.display = '';

      oEl.onclick = (e) => {
        const btn = e.target.closest('.clarify-btn');
        if (!btn) return;
        const idx = parseInt(btn.dataset.idx);
        area.style.display = 'none';
        callback(options[idx].value);
      };
    }

    function stepBunt(team, delta) {
      const total = BalootScoring.TOTAL_BUNT[advState.type];
      const el = document.getElementById(team === 'lana' ? 'advBuntLana' : 'advBuntLahum');
      const otherEl = document.getElementById(team === 'lana' ? 'advBuntLahum' : 'advBuntLana');
      const current = parseInt(el.textContent) || 0;
      const newVal = Math.max(0, Math.min(total, current + delta));
      el.textContent = newVal;
      otherEl.textContent = Math.max(0, total - newVal);
      updateAdvPreview();
    }

    function renderProjects() {
      const type = advState.type;
      const projects = [
        { key: 'sira', label: 'سرا', sun: 4, hokm: 2 },
        { key: '50', label: 'خمسين', sun: 10, hokm: 5 },
        { key: '100', label: 'مية', sun: 20, hokm: 10 },
        { key: '400', label: type === 'sun' ? 'أربعمية' : '٤ إكوات', sun: 40, hokm: 10 },
        { key: 'baloot', label: 'بلوت', sun: 0, hokm: 2 }
      ];

      ['Lana', 'Lahum'].forEach(team => {
        const container = document.getElementById('proj' + team);
        container.innerHTML = projects
          .filter(p => p[type] > 0)
          .map(p => `
            <div class="stepper-row">
              <span class="stepper-label">${p.label}</span>
              <div class="stepper-controls">
                <button class="stepper-btn" onclick="stepProject('${team}','${p.key}',-1)" aria-label="أقل ${p.label}">−</button>
                <span class="stepper-count" id="proj_${team}_${p.key}">0</span>
                <button class="stepper-btn" onclick="stepProject('${team}','${p.key}',1)" aria-label="أكثر ${p.label}">+</button>
              </div>
            </div>
          `).join('');
      });
    }

    function stepProject(team, key, delta) {
      const el = document.getElementById(`proj_${team}_${key}`);
      const current = parseInt(el.textContent) || 0;
      const newVal = Math.max(0, current + delta);
      el.textContent = newVal;
      updateAdvPreview();
    }

    function getProjectCounts(team) {
      const counts = {};
      ['sira', '50', '100', '400', 'baloot'].forEach(key => {
        const el = document.getElementById(`proj_${team}_${key}`);
        if (el) {
          const count = parseInt(el.textContent) || 0;
          if (count > 0) counts[key] = count;
        }

      return counts;
    }

    function updateAdvPreview() {
      if (advState.multiplier === 'coffee') return;

      const kabout = document.getElementById('advKabout').checked;
      const mult = { normal: 1, double: 2, triple: 3, four: 4 }[advState.multiplier] || 1;
      const type = advState.type;

      if (kabout) {
        const winner = advState.kaboutWinner || advState.buyer;
        const loser = winner === 'lana' ? 'lahum' : 'lana';
        const winnerTeam = winner === 'lana' ? 'Lana' : 'Lahum';
        const kaboutBunt = BalootScoring.KABOUT_BUNT[type] * mult;
        const projBunt = BalootScoring.calcProjects(getProjectCounts(winnerTeam), type, mult);
        document.getElementById('previewLana').textContent = winner === 'lana' ? kaboutBunt + projBunt : 0;
        document.getElementById('previewLahum').textContent = winner === 'lahum' ? kaboutBunt + projBunt : 0;
        return;
      }

      const buntLana = parseInt(document.getElementById('advBuntLana').textContent) || 0;
      const buntLahum = parseInt(document.getElementById('advBuntLahum').textContent) || 0;
      const projLana = BalootScoring.calcProjects(getProjectCounts('Lana'), type, mult);
      const projLahum = BalootScoring.calcProjects(getProjectCounts('Lahum'), type, mult);

      // Check buyer failure
      const buyer = advState.buyer;
      const opponent = buyer === 'lana' ? 'lahum' : 'lana';
      const buyerBunt = buyer === 'lana' ? buntLana : buntLahum;
      const halfBunt = Math.ceil(BalootScoring.TOTAL_BUNT[type] / 2);

      if (buyerBunt < halfBunt && (buntLana > 0 || buntLahum > 0)) {
        // Buyer failed — all bunt to opponent
        const allBunt = BalootScoring.TOTAL_BUNT[type] * mult;
        const oppProj = opponent === 'lana' ? projLana : projLahum;
        document.getElementById('previewLana').textContent = opponent === 'lana' ? allBunt + oppProj : 0;
        document.getElementById('previewLahum').textContent = opponent === 'lahum' ? allBunt + oppProj : 0;
      } else {
        document.getElementById('previewLana').textContent = (buntLana * mult) + projLana;
        document.getElementById('previewLahum').textContent = (buntLahum * mult) + projLahum;
      }
    }

    function submitAdvanced() {
      if (advState.multiplier === 'coffee') {
        // Ask who won the coffee round
        const buyerName = advState.buyer === 'lana' ? 'لنا' : 'لهم';
        const opponentName = advState.buyer === 'lana' ? 'لهم' : 'لنا';
        const buyerWon = confirm(`هل فاز المشتري (${buyerName}) بالجولة؟`);
        const winner = buyerWon ? advState.buyer : (advState.buyer === 'lana' ? 'lahum' : 'lana');
        const result = StateManager.handleCoffee(appState, winner);
        resetAdvancedForm();
        render();
        checkSayings('gameOver');
        showGameOver(result.winner);
        broadcastState();
        return;
      }

      const kabout = document.getElementById('advKabout').checked;
      const mult = { normal: 1, double: 2, triple: 3, four: 4 }[advState.multiplier] || 1;
      const type = advState.type;
      let lana = 0, lahum = 0;

      if (kabout) {
        const winner = advState.kaboutWinner || advState.buyer;
        const winnerTeam = winner === 'lana' ? 'Lana' : 'Lahum';
        const kaboutBunt = BalootScoring.KABOUT_BUNT[type] * mult;
        const projBunt = BalootScoring.calcProjects(getProjectCounts(winnerTeam), type, mult);
        if (winner === 'lana') { lana = kaboutBunt + projBunt; } else { lahum = kaboutBunt + projBunt; }
      } else {
        const buntLana = parseInt(document.getElementById('advBuntLana').textContent) || 0;
        const buntLahum = parseInt(document.getElementById('advBuntLahum').textContent) || 0;
        const projLana = BalootScoring.calcProjects(getProjectCounts('Lana'), type, mult);
        const projLahum = BalootScoring.calcProjects(getProjectCounts('Lahum'), type, mult);

        const buyer = advState.buyer;
        const opponent = buyer === 'lana' ? 'lahum' : 'lana';
        const buyerBunt = buyer === 'lana' ? buntLana : buntLahum;
        const halfBunt = Math.ceil(BalootScoring.TOTAL_BUNT[type] / 2);

        if (buyerBunt < halfBunt && (buntLana > 0 || buntLahum > 0)) {
          const allBunt = BalootScoring.TOTAL_BUNT[type] * mult;
          const oppProj = opponent === 'lana' ? projLana : projLahum;
          if (opponent === 'lana') { lana = allBunt + oppProj; } else { lahum = allBunt + oppProj; }
        } else {
          lana = (buntLana * mult) + projLana;
          lahum = (buntLahum * mult) + projLahum;
        }
      }

      if (lana === 0 && lahum === 0) return;

      const roundMeta = {
        type: advState.type,
        buyer: advState.buyer,
        multiplier: advState.multiplier,
        kabout,
        projects: { lana: getProjectCounts('Lana'), lahum: getProjectCounts('Lahum') }
      };

      const result = StateManager.addRound(appState, { lana, lahum }, roundMeta);
      document.querySelector('#advancedForm .btn-primary').classList.add('btn-flash');
      setTimeout(() => document.querySelector('#advancedForm .btn-primary').classList.remove('btn-flash'), 300);
      resetAdvancedForm();
      render();
      checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
      if (result.gameOver) showGameOver(result.winner);
      broadcastState();
    }

    function calcGameStats(game) {
      const rounds = game.rounds || [];
      const stats = {
        totalRounds: rounds.length,
        buyCount: { lana: 0, lahum: 0 },
        sunCount: 0,
        hokmCount: 0,
        kaboutCount: { lana: 0, lahum: 0 },
        projectCount: { lana: 0, lahum: 0 },
        biggestRound: { team: '', score: 0 },
        closestRound: { diff: 999, lana: 0, lahum: 0 },
        doubleCount: 0
      };

      for (const r of rounds) {
        if (r.type === 'coffee') continue;

        // Buyer count
        if (r.buyer) stats.buyCount[r.buyer]++;

        // Type count
        if (r.type === 'sun') stats.sunCount++;
        if (r.type === 'hokm') stats.hokmCount++;

        // Kabout
        if (r.kabout) {
          const kw = r.kaboutWinner || r.buyer || 'lana';
          stats.kaboutCount[kw]++;
        }

        // Projects
        if (r.projects) {
          for (const team of ['lana', 'lahum']) {
            const proj = r.projects[team];
            if (proj) {
              if (typeof proj === 'object' && !Array.isArray(proj)) {
                stats.projectCount[team] += Object.values(proj).reduce((a, b) => a + b, 0);
              } else if (Array.isArray(proj)) {
                stats.projectCount[team] += proj.length;
              }
            }
          }
        }

        // Multiplier
        if (r.multiplier && r.multiplier !== 'normal') stats.doubleCount++;

        // Biggest round
        if (r.bunt) {
          if (r.bunt.lana > stats.biggestRound.score) {
            stats.biggestRound = { team: 'lana', score: r.bunt.lana };
          }
          if (r.bunt.lahum > stats.biggestRound.score) {
            stats.biggestRound = { team: 'lahum', score: r.bunt.lahum };
          }

          // Closest round
          const diff = Math.abs(r.bunt.lana - r.bunt.lahum);
          if (diff < stats.closestRound.diff && diff > 0) {
            stats.closestRound = { diff, lana: r.bunt.lana, lahum: r.bunt.lahum };
          }
        }
      }

      return stats;
    }

    function buildStatsHTML(stats, finalScore) {
      const rows = [];

      // Total rounds
      rows.push(`<div class="stat-row"><span>عدد الجولات</span><span>${stats.totalRounds}</span></div>`);

      // Sun vs Hokm
      if (stats.sunCount > 0 || stats.hokmCount > 0) {
        rows.push(`<div class="stat-row"><span>صن / حكم</span><span>${stats.sunCount} / ${stats.hokmCount}</span></div>`);
      }

      // Who bought more
      if (stats.buyCount.lana > 0 || stats.buyCount.lahum > 0) {
        const moreBuyer = stats.buyCount.lana >= stats.buyCount.lahum ? 'لنا' : 'لهم';
        rows.push(`<div class="stat-row"><span>أكثر فريق اشترى</span><span>${moreBuyer} (${Math.max(stats.buyCount.lana, stats.buyCount.lahum)})</span></div>`);
      }

      // Who had more projects
      if (stats.projectCount.lana > 0 || stats.projectCount.lahum > 0) {
        const moreProj = stats.projectCount.lana >= stats.projectCount.lahum ? 'لنا' : 'لهم';
        rows.push(`<div class="stat-row"><span>أكثر فريق مشاريع</span><span>${moreProj} (${Math.max(stats.projectCount.lana, stats.projectCount.lahum)})</span></div>`);
      }

      // Kabout
      const totalKabout = stats.kaboutCount.lana + stats.kaboutCount.lahum;
      if (totalKabout > 0) {
        rows.push(`<div class="stat-row"><span>كبوت</span><span>لنا ${stats.kaboutCount.lana} • لهم ${stats.kaboutCount.lahum}</span></div>`);
      }

      // Doubles
      if (stats.doubleCount > 0) {
        rows.push(`<div class="stat-row"><span>جولات مضاعفة</span><span>${stats.doubleCount}</span></div>`);
      }

      // Biggest round
      if (stats.biggestRound.score > 0) {
        const team = stats.biggestRound.team === 'lana' ? 'لنا' : 'لهم';
        rows.push(`<div class="stat-row"><span>أعلى جولة</span><span>${team} — ${stats.biggestRound.score}</span></div>`);
      }

      // Closest round
      if (stats.closestRound.diff < 999) {
        rows.push(`<div class="stat-row"><span>أقرب جولة</span><span>${stats.closestRound.lana} - ${stats.closestRound.lahum}</span></div>`);
      }

      return rows.join('');
    }

    function showGameOver(winner) {

      const lastGame = appState.session.games[appState.session.games.length - 1];
      const stats = lastGame ? calcGameStats(lastGame) : null;
      const finalScore = lastGame ? lastGame.finalScore : { lana: 0, lahum: 0 };

      overlay.className = 'game-over-overlay';
      overlay.innerHTML = `
        <h2>انتهت اللعبة!</h2>

    // ── P2P Manager ─────────────────────────────────────────────

    const PEER_PREFIX = 'blot1-';
    let peer = null;
    let connections = [];
    let hostConn = null;
    let isHost = false;
    let editUnlocked = false;
    let roomCode = '';

    function genRoomCode() {
      return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function createRoom() {
      roomCode = genRoomCode();
      document.getElementById('roomModalTitle').textContent = 'غرفة جديدة';
      document.getElementById('roomCreateView').style.display = '';
      document.getElementById('roomJoinView').style.display = 'none';
      document.getElementById('roomCodeDisplay').textContent = roomCode;
      // Generate join URL and QR code
      const joinUrl = window.location.href.split('?')[0] + '?room=' + roomCode;
      const qrBox = document.getElementById('qrBox');
      qrBox.innerHTML = '';
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      new QRCode(qrBox, {
        text: joinUrl, width: 160, height: 160,
        colorDark: isDark ? '#E8E4DC' : '#1A2744',
        colorLight: isDark ? '#1A1A2E' : '#F5F0E6',
        correctLevel: QRCode.CorrectLevel.M
      });
      document.getElementById('connectedCount').textContent = 'جاري الاتصال...';
      document.getElementById('roomModal').classList.add('open');
      document.getElementById('editLockToggle').checked = false;
      editUnlocked = false;

      isHost = true;
      connections = [];

      peer = new Peer(PEER_PREFIX + roomCode.toLowerCase(), {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        document.getElementById('connectedCount').textContent = 'جاهز • ٠ متصلين';
        showRoomStatus('غرفة ' + roomCode + ' • معزّب • ٠ متصلين');
      });

      peer.on('connection', conn => {
        connections.push(conn);
        updateConnCount();

        conn.on('data', msg => {
          if (msg.type === 'round_added' && editUnlocked) {
            const result = StateManager.addRound(appState, msg.payload.bunt, msg.payload.meta || {});
            render();
            checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
            broadcastState();
          }
        });

        conn.on('close', () => {
          connections = connections.filter(c => c !== conn);
          updateConnCount();
        });

        conn.on('open', () => {
          conn.send({ type: 'state_sync', payload: getStatePayload() });
          conn.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
        });
      });

      peer.on('error', err => {
        console.error('Peer error:', err);
        document.getElementById('connectedCount').textContent = 'لم يتم الاتصال، تأكد من الإنترنت';
      });
    }

    function joinRoom() {
      document.getElementById('roomModalTitle').textContent = 'انضم لغرفة';
      document.getElementById('roomCreateView').style.display = 'none';
      document.getElementById('roomJoinView').style.display = '';
      document.getElementById('joinCodeInput').value = '';
      document.getElementById('joinError').textContent = '';
      document.getElementById('roomModal').classList.add('open');
    }

    function doJoinRoom() {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      if (!code || code.length !== 4) {
        document.getElementById('joinError').textContent = 'أدخل رمز من ٤ أحرف';
        return;
      }
      document.getElementById('joinError').textContent = 'جاري الاتصال...';
      isHost = false;
      roomCode = code;

      peer = new Peer(undefined, {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        hostConn = peer.connect(PEER_PREFIX + code.toLowerCase());

        hostConn.on('open', () => {
          closeRoomModal();
          showRoomStatus('غرفة ' + code + ' • متصل');
        });

        hostConn.on('data', msg => {
          switch (msg.type) {
            case 'state_sync':
              applyStatePayload(msg.payload);
              render();
              break;
            case 'edit_lock':
              editUnlocked = msg.payload.unlocked;
              document.getElementById('scoreEntry').style.display = editUnlocked ? '' : 'none';
              break;
          }
        });

        hostConn.on('close', () => {
          showRoomStatus('انقطع الاتصال');
          hostConn = null;
        });

        setTimeout(() => {
          if (!hostConn || !hostConn.open) {
            document.getElementById('joinError').textContent = 'لم يتم العثور على الغرفة، تأكد من الرمز والإنترنت';
            if (peer) peer.destroy();
          }
        }, 10000);
      });
    }

    function closeRoomModal() {
      document.getElementById('roomModal').classList.remove('open');
    }

    function getJoinUrl() {
      return window.location.href.split('?')[0] + '?room=' + roomCode;
    }

    function copyRoomLink() {
      navigator.clipboard.writeText(getJoinUrl()).then(() => {
        const msg = document.getElementById('copyMsg');
        msg.textContent = 'تم نسخ الرابط!';
        msg.style.opacity = '1';
        setTimeout(() => msg.style.opacity = '0', 1500);
      });
    }

    function shareRoom() {
      const joinUrl = getJoinUrl();
      if (navigator.share) {
        navigator.share({
          title: 'حاسبة بلوت - الديوانية',
          text: 'تعال انضم للغرفة! الرمز: ' + roomCode,
          url: joinUrl
        }).catch(() => {
          // User cancelled share, fall back to copy
          copyRoomLink();
        });
      } else {
        // Web Share not supported, fall back to copy
        copyRoomLink();
      }
    }

    function toggleEditLock() {
      editUnlocked = document.getElementById('editLockToggle').checked;
      connections.forEach(c => {
        if (c.open) c.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
      });
    }

    function updateConnCount() {
      const count = connections.filter(c => c.open).length;
      const arabic = count.toLocaleString('ar-SA');
      document.getElementById('connectedCount').textContent = arabic + ' متصلين';
      showRoomStatus('غرفة ' + roomCode + ' • معزّب • ' + arabic + ' متصلين');
    }

    function showRoomStatus(text) {
      document.getElementById('roomStatus').style.display = '';
      document.getElementById('roomStatusText').textContent = text;
      // Show edit toggle only for host
      const editBtn = document.getElementById('editToggleBar');
      if (isHost) {
        editBtn.style.display = '';
        editBtn.textContent = editUnlocked ? 'تعديل: مفتوح' : 'تعديل: مقفل';
        editBtn.style.background = editUnlocked ? 'rgba(114,47,55,0.6)' : 'transparent';
      } else {
        editBtn.style.display = 'none';
      }
    }

    function toggleEditFromBar() {
      editUnlocked = !editUnlocked;
      document.getElementById('editLockToggle').checked = editUnlocked;
      toggleEditLock();
      // Update button text
      const editBtn = document.getElementById('editToggleBar');
      editBtn.textContent = editUnlocked ? 'تعديل: مفتوح' : 'تعديل: مقفل';
      editBtn.style.background = editUnlocked ? 'rgba(114,47,55,0.6)' : 'transparent';
    }

    function hideRoomStatus() {
      document.getElementById('roomStatus').style.display = 'none';
    }

    function leaveRoom() {
      if (peer) { peer.destroy(); peer = null; }
      connections = [];
      hostConn = null;
      isHost = false;
      roomCode = '';
      editUnlocked = false;
      hideRoomStatus();
      render();
    }

    function getStatePayload() {
      return {
        session: appState.session,
        currentGame: appState.currentGame
      };
    }

    function applyStatePayload(payload) {
      appState.session = payload.session;
      appState.currentGame = payload.currentGame;
      StateManager.save(appState);
    }

    function broadcastState() {
      if (!isHost) {
        if (hostConn && hostConn.open) {
          const rounds = appState.currentGame.rounds;
          const lastRound = rounds[rounds.length - 1];
          if (lastRound) {
            hostConn.send({
              type: 'round_added',
              payload: { bunt: lastRound.bunt, meta: lastRound }
            });
          }
        }
        return;
      }

      const payload = { type: 'state_sync', payload: getStatePayload() };
      connections.forEach(c => {
        if (c.open) c.send(payload);
      });
    }
    // ── Sayings Engine ──────────────────────────────────────────

    const SAYINGS = {
      gameWin1:     'أنزل ثانية',
      tied11:       'افصلها!',
      sweep20:      'نظيفة ✨',
      deciderWin:   'فصلها! 💪',
      closeTo152:   'قربت.. حسمها!',
      neckAndNeck:  'كتف بكتف',
      comeback:     'رجعوا!',
      blowout:      'مسح فيهم الأرض 😂'
    };

    let sayingTimeout = null;

    function showSaying(text) {
      const el = document.getElementById('saying');
      el.textContent = text;
      el.style.opacity = '';
      el.classList.add('visible');
      clearTimeout(sayingTimeout);
      sayingTimeout = setTimeout(() => el.classList.remove('visible'), 4000);
    }

    function hideSaying() {
      const el = document.getElementById('saying');
      el.classList.remove('visible');
      clearTimeout(sayingTimeout);
    }

    function checkSayings(event) {
      const { currentGame, session } = appState;
      const score = currentGame.score;

      if (event === 'gameOver') {
        const wLana = session.wins.lana;
        const wLahum = session.wins.lahum;

        // Session sweep (2-0)
        if ((wLana === 2 && wLahum === 0) || (wLahum === 2 && wLana === 0)) {
          showSaying(SAYINGS.sweep20);
          return;
        }
        // Decider win (2-1)
        if ((wLana === 2 && wLahum === 1) || (wLahum === 2 && wLana === 1)) {
          showSaying(SAYINGS.deciderWin);
          return;
        }
        // Tied 1-1
        if (wLana === 1 && wLahum === 1) {
          showSaying(SAYINGS.tied11);
          return;
        }
        // First game won (1-0)
        const totalGames = wLana + wLahum;
        if (totalGames === 1) {
          showSaying(SAYINGS.gameWin1);
          return;
        }

        // Blowout check on the last finished game
        const lastGame = session.games[session.games.length - 1];
        if (lastGame) {
          const loserScore = Math.min(lastGame.finalScore.lana, lastGame.finalScore.lahum);
          if (loserScore < 50) {
            showSaying(SAYINGS.blowout);
            return;
          }
        }
        return;
      }

      if (event === 'roundEnd') {
        // Comeback: a team that was behind now leads
        const rounds = currentGame.rounds;
        if (rounds.length >= 2) {
          const lastRound = rounds[rounds.length - 1];
          const prevLana = score.lana - lastRound.bunt.lana;
          const prevLahum = score.lahum - lastRound.bunt.lahum;
          const wasLeading = prevLana > prevLahum ? 'lana' : (prevLahum > prevLana ? 'lahum' : null);
          const nowLeading = score.lana > score.lahum ? 'lana' : (score.lahum > score.lana ? 'lahum' : null);
          if (wasLeading && nowLeading && wasLeading !== nowLeading) {
            showSaying(SAYINGS.comeback);
            return;
          }
        }

        // Close to 152
        if (score.lana >= 130 || score.lahum >= 130) {
          showSaying(SAYINGS.closeTo152);
          return;
        }

        // Neck and neck
        if (score.lana > 20 && score.lahum > 20 && Math.abs(score.lana - score.lahum) <= 10) {
          showSaying(SAYINGS.neckAndNeck);
          return;
        }
      }
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = '';
    });
    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('installBtn').style.display = 'none';
      });
    }

    // ── Theme Manager ───────────────────────────────────────────
    function getPreferredTheme() {
      const saved = localStorage.getItem('baloot_theme');
      if (saved) return saved;
      return 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
      const themeLabel = document.getElementById('themeLabel');
      if (themeLabel) themeLabel.textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('baloot_theme', theme);
      const meta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (meta) meta.content = theme === 'dark' ? '#1A1A2E' : '#722F37';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    function openMenu() {
      document.getElementById('menuOverlay').classList.add('open');
      document.getElementById('sideMenu').classList.add('open');
    }

    function closeMenu() {
      document.getElementById('menuOverlay').classList.remove('open');
      document.getElementById('sideMenu').classList.remove('open');
    }

    // Apply theme on load
    applyTheme(getPreferredTheme());

    // Initial render
    if (appState.settings.mode === 'advanced') {
      resetAdvancedForm();
    }
    updateScrollLock(appState.settings.mode);
    render();

    // Auto-join room from URL parameter
    (function() {
      const params = new URLSearchParams(window.location.search);
      const roomParam = params.get('room');
      if (roomParam && roomParam.length === 4) {
        // Clean URL without reloading
        window.history.replaceState({}, '', window.location.pathname);
        // Auto-join after a short delay for PeerJS to load
        setTimeout(() => {
          document.getElementById('joinCodeInput').value = roomParam.toUpperCase();
          doJoinRoom();
        }, 500);
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
