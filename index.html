<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#722F37">
  <title>حاسبة بلوت - الديوانية</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F0E6;
      --burgundy: #722F37;
      --gold: #C9A227;
      --navy: #1A2744;
      --text: #1D1E20;
      --cream: #F5F0E6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button {
      font-family: 'Cairo', sans-serif;
      background: var(--burgundy);
      color: var(--cream);
      border: none;
      border-radius: 28px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }

    .card {
      background: var(--cream);
      border: 1px solid var(--navy);
      border-radius: 20px;
      padding: 12px 16px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      text-align: center;
      padding: 16px 16px 8px;
    }
    .header h1 {
      color: var(--gold);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0;
      background: var(--navy);
      border-radius: 20px;
      padding: 3px;
      width: fit-content;
      margin: 8px auto 0;
    }
    .mode-toggle button {
      background: transparent;
      color: var(--cream);
      padding: 6px 18px;
      font-size: 13px;
      border-radius: 18px;
      opacity: 0.6;
    }
    .mode-toggle button.active {
      background: var(--burgundy);
      opacity: 1;
    }
    .scoreboard {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 20px 16px 12px;
    }
    .team { text-align: center; flex: 1; }
    .team-label { color: var(--gold); font-size: 18px; font-weight: 700; }
    .team-score { color: var(--navy); font-size: 52px; font-weight: 700; line-height: 1.1; }
    .score-divider { color: var(--navy); font-size: 28px; opacity: 0.3; padding: 0 4px; }
    .progress-wrap { padding: 0 24px 16px; display: flex; gap: 8px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(26, 39, 68, 0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--burgundy); border-radius: 3px; transition: width 0.4s ease; }
    .progress-fill.lahum { background: var(--navy); }
    .rounds-section { padding: 0 16px; }
    .rounds-label { color: var(--navy); font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .rounds-list { display: flex; flex-direction: column; gap: 8px; max-height: 35vh; overflow-y: auto; padding-bottom: 8px; }
    .round-card { background: var(--cream); border: 1px solid rgba(26, 39, 68, 0.15); border-radius: 20px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 15px; }
    .round-num { color: var(--navy); font-weight: 700; min-width: 24px; }
    .round-type { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; color: var(--cream); }
    .round-type.sun { background: var(--gold); }
    .round-type.hokm { background: var(--navy); }
    .round-scores { font-weight: 600; color: var(--text); }
    .saying { text-align: center; color: var(--gold); font-size: 18px; font-weight: 700; padding: 12px 16px; min-height: 48px; opacity: 0; transition: opacity 0.5s ease; }
    .saying.visible { opacity: 1; }
    .actions { padding: 8px 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-primary { width: 100%; max-width: 280px; padding: 14px 28px; font-size: 18px; }
    .btn-secondary { background: transparent; color: var(--navy); border: 1px solid var(--navy); font-size: 13px; padding: 8px 20px; }
    .session-bar { text-align: center; padding: 8px 16px; font-size: 15px; font-weight: 700; color: var(--navy); }
    .room-actions { display: flex; justify-content: center; gap: 8px; padding: 4px 16px 16px; }
    .room-actions button { font-size: 12px; padding: 8px 16px; background: var(--navy); }
    .bottom-pad { height: env(safe-area-inset-bottom, 16px); }
    .suit-accent { color: var(--burgundy); opacity: 0.08; font-size: 120px; position: fixed; pointer-events: none; z-index: 0; }
    .suit-accent.top-left { top: -20px; right: -20px; }
    .suit-accent.bottom-right { bottom: -20px; left: -20px; }

    /* ── Modal ──────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 39, 68, 0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 430px;
      padding: 24px 20px env(safe-area-inset-bottom, 20px);
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title {
      color: var(--navy);
      font-size: 20px;
      font-weight: 700;
    }
    .modal-close {
      background: transparent;
      color: var(--navy);
      font-size: 24px;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .input-group { margin-bottom: 16px; }
    .input-label { display: block; color: var(--gold); font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(26, 39, 68, 0.2);
      border-radius: 16px;
      font-family: 'Cairo', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      background: white;
      color: var(--navy);
      outline: none;
      -moz-appearance: textfield;
    }
    .input-field::-webkit-outer-spin-button,
    .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-field:focus { border-color: var(--burgundy); }

    .input-row { display: flex; gap: 12px; }
    .input-row .input-group { flex: 1; }

    .toggle-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .toggle-btn {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      background: transparent;
      color: var(--navy);
      border: 1px solid rgba(26, 39, 68, 0.2);
      border-radius: 16px;
      opacity: 0.6;
    }
    .toggle-btn.active {
      background: var(--burgundy);
      color: var(--cream);
      border-color: var(--burgundy);
      opacity: 1;
    }

    .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
    .checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--burgundy); }
    .checkbox-label { font-size: 14px; color: var(--text); }
    .checkbox-value { margin-right: auto; font-size: 13px; color: var(--gold); font-weight: 700; }

    .preview-bar {
      background: var(--navy);
      color: var(--cream);
      border-radius: 16px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-around;
      margin: 16px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .section-divider { border: none; border-top: 1px solid rgba(26, 39, 68, 0.1); margin: 16px 0; }

    .kabout-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(114, 47, 55, 0.05);
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .kabout-label { font-size: 16px; font-weight: 700; color: var(--burgundy); }

    .switch { position: relative; width: 48px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 28px;
      transition: 0.3s;
      cursor: pointer;
    }
    .switch .slider:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      bottom: 3px;
      right: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: var(--burgundy); }
    .switch input:checked + .slider:before { transform: translateX(-20px); }
  </style>
</head>
<body>
  <!-- Decorative suit accents -->
  <div class="suit-accent top-left">♠</div>
  <div class="suit-accent bottom-right">♥</div>

  <main>
    <div id="roomStatus" style="display:none;text-align:center;padding:4px;font-size:12px;color:var(--cream);background:var(--navy)">
      <span id="roomStatusText"></span>
    </div>
    <div class="header">
      <h1>حاسبة بلوت</h1>
      <div class="mode-toggle">
        <button id="btnSimple" class="active" onclick="setMode('simple')">بسيط</button>
        <button id="btnAdvanced" onclick="setMode('advanced')">تفصيلي</button>
      </div>
    </div>

    <div class="scoreboard">
      <div class="team">
        <div class="team-label">لنا</div>
        <div class="team-score" id="scoreLana">0</div>
      </div>
      <div class="score-divider">-</div>
      <div class="team">
        <div class="team-label">لهم</div>
        <div class="team-score" id="scoreLahum">0</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progLana" style="width:0%"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill lahum" id="progLahum" style="width:0%"></div>
      </div>
    </div>

    <div class="rounds-section">
      <div class="rounds-label">الجولات</div>
      <div class="rounds-list" id="roundsList"></div>
    </div>

    <div class="saying" id="saying"></div>

    <div class="actions">
      <button class="btn-primary" id="btnNewRound" onclick="openRoundModal()">جولة جديدة</button>
      <button class="btn-secondary" id="btnNewGame" onclick="confirmNewGame()" style="display:none">لعبة جديدة</button>
    </div>

    <div class="session-bar" id="sessionBar">لنا 0 - 0 لهم</div>

    <div class="room-actions">
      <button onclick="createRoom()">غرفة جديدة</button>
      <button onclick="joinRoom()">انضم لغرفة</button>
    </div>

    <div class="actions">
      <button class="btn-secondary" onclick="confirmNewSession()">جلسة جديدة</button>
    </div>

    <div class="bottom-pad"></div>

    <!-- Round Entry Modal -->
    <div class="modal-overlay" id="roundModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">جولة جديدة</span>
          <button class="modal-close" onclick="closeRoundModal()">✕</button>
        </div>

        <!-- Simple Mode -->
        <div id="simpleForm">
          <div class="input-row">
            <div class="input-group">
              <label class="input-label">لنا</label>
              <input type="number" class="input-field" id="simpleLana" min="0" inputmode="numeric">
            </div>
            <div class="input-group">
              <label class="input-label">لهم</label>
              <input type="number" class="input-field" id="simpleLahum" min="0" inputmode="numeric">
            </div>
          </div>
          <button class="btn-primary" style="width:100%" onclick="submitSimple()">تأكيد</button>
        </div>

        <!-- Advanced Mode -->
        <div id="advancedForm" style="display:none">
          <div class="input-label">نوع اللعب</div>
          <div class="toggle-group">
            <button class="toggle-btn active" id="advTypeSun" onclick="setAdvType('sun')">صن</button>
            <button class="toggle-btn" id="advTypeHokm" onclick="setAdvType('hokm')">حكم</button>
          </div>
          <div class="input-label">المشتري</div>
          <div class="toggle-group">
            <button class="toggle-btn active" id="advBuyerLana" onclick="setAdvBuyer('lana')">لنا</button>
            <button class="toggle-btn" id="advBuyerLahum" onclick="setAdvBuyer('lahum')">لهم</button>
          </div>

          <hr class="section-divider">

          <div class="input-label">المضاعفة</div>
          <div class="toggle-group" style="flex-wrap:wrap">
            <button class="toggle-btn active" id="advMultNormal" onclick="setAdvMult('normal')">عادي</button>
            <button class="toggle-btn" id="advMultDouble" onclick="setAdvMult('double')">دبل</button>
            <button class="toggle-btn" id="advMultTriple" onclick="setAdvMult('triple')">ثري</button>
            <button class="toggle-btn" id="advMultFour" onclick="setAdvMult('four')">فور</button>
            <button class="toggle-btn" id="advMultCoffee" onclick="setAdvMult('coffee')">قهوة</button>
          </div>

          <hr class="section-divider">

          <div class="kabout-toggle">
            <span class="kabout-label">كبوت</span>
            <label class="switch">
              <input type="checkbox" id="advKabout" onchange="toggleKabout()">
              <span class="slider"></span>
            </label>
          </div>

          <div id="cardPointsSection">
            <div class="input-label">نقاط الورق</div>
            <div class="input-row">
              <div class="input-group">
                <label class="input-label" style="font-size:13px">لنا</label>
                <input type="number" class="input-field" id="advRawLana" min="0" inputmode="numeric" oninput="syncRawPoints('lana')">
              </div>
              <div class="input-group">
                <label class="input-label" style="font-size:13px">لهم</label>
                <input type="number" class="input-field" id="advRawLahum" min="0" inputmode="numeric" oninput="syncRawPoints('lahum')">
              </div>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="advLastTrickLana" onchange="if(this.checked) document.getElementById('advLastTrickLahum').checked=false">
              <span class="checkbox-label">أكلة الأرض - لنا</span>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="advLastTrickLahum" onchange="if(this.checked) document.getElementById('advLastTrickLana').checked=false">
              <span class="checkbox-label">أكلة الأرض - لهم</span>
            </div>
          </div>

          <hr class="section-divider">

          <div id="projectsSection">
            <div class="input-label">مشاريع لنا</div>
            <div id="projLana"></div>
            <div class="input-label" style="margin-top:12px">مشاريع لهم</div>
            <div id="projLahum"></div>
          </div>

          <hr class="section-divider">

          <div class="preview-bar" id="advPreview">
            <span>لنا: <span id="previewLana">0</span></span>
            <span>لهم: <span id="previewLahum">0</span></span>
          </div>

          <button class="btn-primary" style="width:100%" onclick="submitAdvanced()">تأكيد</button>
        </div>
      </div>
    </div>
    <!-- Room Modal -->
    <div class="modal-overlay" id="roomModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="roomModalTitle">غرفة جديدة</span>
          <button class="modal-close" onclick="closeRoomModal()">✕</button>
        </div>

        <div id="roomCreateView">
          <div style="text-align:center;padding:20px 0">
            <div style="font-size:48px;font-weight:700;color:var(--navy);letter-spacing:12px" id="roomCodeDisplay"></div>
            <div style="color:var(--gold);margin-top:8px;font-size:14px">شارك الرمز مع اللاعبين</div>
          </div>
          <div style="text-align:center;font-size:13px;color:var(--navy);opacity:0.6" id="connectedCount"></div>
          <div class="kabout-toggle" style="margin-top:16px">
            <span class="kabout-label" style="font-size:14px">السماح بالتعديل</span>
            <label class="switch">
              <input type="checkbox" id="editLockToggle" onchange="toggleEditLock()">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div id="roomJoinView" style="display:none">
          <div class="input-group">
            <label class="input-label">رمز الغرفة</label>
            <input type="text" class="input-field" id="joinCodeInput" maxlength="4"
              style="text-transform:uppercase;letter-spacing:8px" placeholder="----" inputmode="text">
          </div>
          <button class="btn-primary" style="width:100%" onclick="doJoinRoom()">انضم</button>
          <div style="color:var(--burgundy);text-align:center;margin-top:8px;font-size:13px" id="joinError"></div>
        </div>
      </div>
    </div>
  </main>

  <script
    src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"
    integrity="sha384-nlUQ8ZqCbvStErob+biJNzSgltf6urV3VGqhfIfzhmg9RXmpeRm76ELw0pYnKlTR"
    crossorigin="anonymous"
  ></script>
  <script>
    // ── Scoring Engine ──────────────────────────────────────────

    const BalootScoring = {
      PROJECT_VALUES: {
        sira:    { sun: 4,  hokm: 2 },
        '50':    { sun: 10, hokm: 5 },
        '100':   { sun: 20, hokm: 10 },
        '400':   { sun: 40, hokm: 10 },
        baloot:  { sun: 0,  hokm: 2 }
      },

      TOTAL_RAW: { sun: 260, hokm: 162 },
      KABOUT_BUNT: { sun: 44, hokm: 25 },
      FAIL_THRESHOLD: { sun: 66, hokm: 81 },
      TOTAL_BUNT: { sun: 26, hokm: 16 },

      rawToBunt(raw, type) {
        if (type === 'sun') {
          const remainder = raw % 10;
          let rounded;
          if (remainder === 5) {
            rounded = raw;
          } else if (remainder < 5) {
            rounded = raw - remainder;
          } else {
            rounded = raw + (10 - remainder);
          }
          return (rounded * 2) / 10;
        } else {
          return Math.floor(raw / 10);
        }
      },

      calcProjects(projects, type, multiplier) {
        let total = 0;
        for (const p of projects) {
          const val = this.PROJECT_VALUES[p]?.[type] || 0;
          if (p === 'baloot') {
            total += val; // baloot is never multiplied
          } else {
            total += val * multiplier;
          }
        }
        return total;
      },

      calculateRound(round) {
        const { type, buyer, multiplier, kabout, kaboutWinner, projects, rawPoints } = round;
        const mult = { normal: 1, double: 2, triple: 3, four: 4, coffee: 1 }[multiplier] || 1;
        const opponent = buyer === 'lana' ? 'lahum' : 'lana';

        if (multiplier === 'coffee') {
          return { lana: 0, lahum: 0, gameOver: true, coffeeWinner: opponent };
        }

        if (kabout) {
          const winner = kaboutWinner || buyer;
          const loser = winner === 'lana' ? 'lahum' : 'lana';
          const kaboutBunt = this.KABOUT_BUNT[type] * mult;
          const projBunt = this.calcProjects(projects[winner] || [], type, mult);
          const result = { lana: 0, lahum: 0, gameOver: false };
          result[winner] = kaboutBunt + projBunt;
          return result;
        }

        const buntLana = this.rawToBunt(rawPoints.lana, type);
        const buntLahum = this.rawToBunt(rawPoints.lahum, type);

        const buyerFailed = rawPoints[buyer] < this.FAIL_THRESHOLD[type];

        let result = { lana: 0, lahum: 0, gameOver: false };

        if (buyerFailed) {
          result[opponent] = this.TOTAL_BUNT[type] * mult;
          result[opponent] += this.calcProjects(projects[opponent] || [], type, mult);
        } else {
          result.lana = buntLana * mult;
          result.lahum = buntLahum * mult;
          result.lana += this.calcProjects(projects.lana || [], type, mult);
          result.lahum += this.calcProjects(projects.lahum || [], type, mult);
        }

        return result;
      }
    };

    // ── State Manager ───────────────────────────────────────────

    const StateManager = {
      STORAGE_KEY: 'baloot_state',

      _defaultState() {
        return {
          session: {
            wins: { lana: 0, lahum: 0 },
            games: []
          },
          currentGame: {
            rounds: [],
            score: { lana: 0, lahum: 0 }
          },
          settings: {
            mode: 'simple'
          }
        };
      },

      load() {
        try {
          const raw = localStorage.getItem(this.STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const def = this._defaultState();
            return {
              session: parsed.session || def.session,
              currentGame: parsed.currentGame || def.currentGame,
              settings: parsed.settings || def.settings
            };
          }
        } catch (e) { /* ignore corrupt data */ }
        return this._defaultState();
      },

      save(state) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
      },

      addRound(state, bunt, roundMeta) {
        const round = {
          ...roundMeta,
          bunt: { ...bunt },
          roundNum: state.currentGame.rounds.length + 1
        };
        state.currentGame.rounds.push(round);
        state.currentGame.score.lana += bunt.lana;
        state.currentGame.score.lahum += bunt.lahum;

        if (state.currentGame.score.lana >= 152 || state.currentGame.score.lahum >= 152) {
          return this._endGame(state);
        }
        this.save(state);
        return { gameOver: false };
      },

      handleCoffee(state, winner) {
        const loser = winner === 'lana' ? 'lahum' : 'lana';
        state.currentGame.rounds.push({
          type: 'coffee',
          bunt: { lana: 0, lahum: 0 },
          roundNum: state.currentGame.rounds.length + 1,
          coffeeWinner: winner
        });
        return this._endGame(state, winner);
      },

      _endGame(state, forceWinner) {
        const winner = forceWinner ||
          (state.currentGame.score.lana >= 152 ? 'lana' : 'lahum');

        const finishedGame = {
          rounds: [...state.currentGame.rounds],
          winner,
          finalScore: { ...state.currentGame.score }
        };
        state.session.games.push(finishedGame);
        state.session.wins[winner]++;

        const sessionOver = state.session.wins.lana >= 2 || state.session.wins.lahum >= 2;

        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);

        return { gameOver: true, winner, sessionOver };
      },

      newGame(state) {
        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);
      },

      newSession(state) {
        state.session = { wins: { lana: 0, lahum: 0 }, games: [] };
        state.currentGame = { rounds: [], score: { lana: 0, lahum: 0 } };
        this.save(state);
      },

      setMode(state, mode) {
        state.settings.mode = mode;
        this.save(state);
      },

      undoLastRound(state) {
        const rounds = state.currentGame.rounds;
        if (rounds.length === 0) return;
        const last = rounds.pop();
        state.currentGame.score.lana -= last.bunt.lana;
        state.currentGame.score.lahum -= last.bunt.lahum;
        this.save(state);
      }
    };

    // ── UI Renderer ─────────────────────────────────────────────

    let appState = StateManager.load();

    function render() {
      const { currentGame, session, settings } = appState;

      document.getElementById('scoreLana').textContent = currentGame.score.lana;
      document.getElementById('scoreLahum').textContent = currentGame.score.lahum;

      const progLana = Math.min((currentGame.score.lana / 152) * 100, 100);
      const progLahum = Math.min((currentGame.score.lahum / 152) * 100, 100);
      document.getElementById('progLana').style.width = progLana + '%';
      document.getElementById('progLahum').style.width = progLahum + '%';

      const list = document.getElementById('roundsList');
      list.innerHTML = currentGame.rounds.map(r => {
        if (r.type === 'coffee') {
          return `<div class="round-card">
            <span class="round-num">${r.roundNum}</span>
            <span class="round-type hokm">قهوة</span>
            <span class="round-scores">${r.coffeeWinner === 'lana' ? 'لنا' : 'لهم'} فاز</span>
          </div>`;
        }
        const typeClass = r.type === 'sun' ? 'sun' : 'hokm';
        const typeLabel = r.type === 'sun' ? 'صن' : (r.type === 'hokm' ? 'حكم' : '');
        return `<div class="round-card">
          <span class="round-num">${r.roundNum}</span>
          ${typeLabel ? `<span class="round-type ${typeClass}">${typeLabel}</span>` : ''}
          <span class="round-scores">${r.bunt.lana} - ${r.bunt.lahum}</span>
        </div>`;
      }).join('');

      document.getElementById('sessionBar').textContent =
        `لنا ${session.wins.lana} - ${session.wins.lahum} لهم`;

      document.getElementById('btnSimple').classList.toggle('active', settings.mode === 'simple');
      document.getElementById('btnAdvanced').classList.toggle('active', settings.mode === 'advanced');

      const gameOver = session.games.length > 0 &&
        currentGame.rounds.length === 0 &&
        session.wins.lana < 2 && session.wins.lahum < 2;
      document.getElementById('btnNewGame').style.display = gameOver ? '' : 'none';
      document.getElementById('btnNewRound').style.display = gameOver ? 'none' : '';

      // If connected as player and edit is locked, hide new round button
      if (hostConn && !editUnlocked) {
        document.getElementById('btnNewRound').style.display = 'none';
      }
    }

    function setMode(mode) {
      StateManager.setMode(appState, mode);
      render();
    }

    function confirmNewGame() {
      if (confirm('بدء لعبة جديدة؟')) {
        StateManager.newGame(appState);
        render();
        checkSayings('newGame');
      }
    }

    function confirmNewSession() {
      if (confirm('بدء جلسة جديدة؟ سيتم مسح جميع النتائج')) {
        StateManager.newSession(appState);
        render();
        hideSaying();
      }
    }

    // ── Modal Logic ─────────────────────────────────────────────

    let advState = { type: 'sun', buyer: 'lana', multiplier: 'normal' };

    function openRoundModal() {
      const modal = document.getElementById('roundModal');
      modal.classList.add('open');

      const isAdvanced = appState.settings.mode === 'advanced';
      document.getElementById('simpleForm').style.display = isAdvanced ? 'none' : '';
      document.getElementById('advancedForm').style.display = isAdvanced ? '' : 'none';

      if (isAdvanced) {
        advState = { type: 'sun', buyer: 'lana', multiplier: 'normal' };
        resetAdvancedForm();
      } else {
        document.getElementById('simpleLana').value = '';
        document.getElementById('simpleLahum').value = '';
      }
    }

    function closeRoundModal() {
      document.getElementById('roundModal').classList.remove('open');
    }

    function submitSimple() {
      const lana = parseInt(document.getElementById('simpleLana').value) || 0;
      const lahum = parseInt(document.getElementById('simpleLahum').value) || 0;
      if (lana === 0 && lahum === 0) return;

      const result = StateManager.addRound(appState, { lana, lahum }, {});
      closeRoundModal();
      render();
      checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
      if (result.gameOver) showGameOver(result.winner);
      broadcastState();
    }

    function setAdvType(type) {
      advState.type = type;
      document.getElementById('advTypeSun').classList.toggle('active', type === 'sun');
      document.getElementById('advTypeHokm').classList.toggle('active', type === 'hokm');
      renderProjects();
      updateAdvPreview();
    }

    function setAdvBuyer(buyer) {
      advState.buyer = buyer;
      document.getElementById('advBuyerLana').classList.toggle('active', buyer === 'lana');
      document.getElementById('advBuyerLahum').classList.toggle('active', buyer === 'lahum');
      updateAdvPreview();
    }

    function setAdvMult(mult) {
      advState.multiplier = mult;
      ['Normal', 'Double', 'Triple', 'Four', 'Coffee'].forEach(m => {
        const key = m.toLowerCase();
        document.getElementById('advMult' + m).classList.toggle('active', key === mult);
      });
      const isCoffee = mult === 'coffee';
      document.getElementById('cardPointsSection').style.display = isCoffee ? 'none' : '';
      document.getElementById('projectsSection').style.display = isCoffee ? 'none' : '';
      document.getElementById('advPreview').style.display = isCoffee ? 'none' : '';
      updateAdvPreview();
    }

    function toggleKabout() {
      const kabout = document.getElementById('advKabout').checked;
      document.getElementById('cardPointsSection').style.display = kabout ? 'none' : '';
      updateAdvPreview();
    }

    function syncRawPoints(team) {
      const total = BalootScoring.TOTAL_RAW[advState.type];
      const el = document.getElementById(team === 'lana' ? 'advRawLana' : 'advRawLahum');
      const otherEl = document.getElementById(team === 'lana' ? 'advRawLahum' : 'advRawLana');
      const val = parseInt(el.value) || 0;
      otherEl.value = Math.max(0, total - val);
      updateAdvPreview();
    }

    function renderProjects() {
      const type = advState.type;
      const projects = [
        { key: 'sira', label: 'سرا', sun: 4, hokm: 2 },
        { key: '50', label: 'خمسين', sun: 10, hokm: 5 },
        { key: '100', label: 'مية', sun: 20, hokm: 10 },
        { key: '400', label: type === 'sun' ? 'أربعمية' : '٤ إكوات', sun: 40, hokm: 10 },
        { key: 'baloot', label: 'بلوت', sun: 0, hokm: 2 }
      ];

      ['Lana', 'Lahum'].forEach(team => {
        const container = document.getElementById('proj' + team);
        container.innerHTML = projects
          .filter(p => p[type] > 0)
          .map(p => `
            <div class="checkbox-row">
              <input type="checkbox" id="proj_${team}_${p.key}" onchange="updateAdvPreview()">
              <span class="checkbox-label">${p.label}</span>
              <span class="checkbox-value">${p[type]}</span>
            </div>
          `).join('');
      });
    }

    function getSelectedProjects(team) {
      const projects = [];
      ['sira', '50', '100', '400', 'baloot'].forEach(key => {
        const cb = document.getElementById(`proj_${team}_${key}`);
        if (cb && cb.checked) projects.push(key);
      });
      return projects;
    }

    function updateAdvPreview() {
      if (advState.multiplier === 'coffee') return;

      const kabout = document.getElementById('advKabout').checked;
      const rawLana = parseInt(document.getElementById('advRawLana').value) || 0;
      const rawLahum = parseInt(document.getElementById('advRawLahum').value) || 0;

      const roundData = {
        type: advState.type,
        buyer: advState.buyer,
        multiplier: advState.multiplier,
        kabout,
        kaboutWinner: advState.buyer,
        projects: {
          lana: getSelectedProjects('Lana'),
          lahum: getSelectedProjects('Lahum')
        },
        rawPoints: { lana: rawLana, lahum: rawLahum }
      };

      const result = BalootScoring.calculateRound(roundData);
      document.getElementById('previewLana').textContent = result.lana;
      document.getElementById('previewLahum').textContent = result.lahum;
    }

    function resetAdvancedForm() {
      setAdvType('sun');
      setAdvBuyer('lana');
      setAdvMult('normal');
      document.getElementById('advKabout').checked = false;
      document.getElementById('cardPointsSection').style.display = '';
      document.getElementById('advRawLana').value = '';
      document.getElementById('advRawLahum').value = '';
      document.getElementById('advLastTrickLana').checked = false;
      document.getElementById('advLastTrickLahum').checked = false;
      renderProjects();
      updateAdvPreview();
    }

    function submitAdvanced() {
      if (advState.multiplier === 'coffee') {
        const winner = advState.buyer === 'lana' ? 'lahum' : 'lana';
        const result = StateManager.handleCoffee(appState, winner);
        closeRoundModal();
        render();
        checkSayings('gameOver');
        showGameOver(result.winner);
        broadcastState();
        return;
      }

      const kabout = document.getElementById('advKabout').checked;
      const rawLana = parseInt(document.getElementById('advRawLana').value) || 0;
      const rawLahum = parseInt(document.getElementById('advRawLahum').value) || 0;

      const roundData = {
        type: advState.type,
        buyer: advState.buyer,
        multiplier: advState.multiplier,
        kabout,
        kaboutWinner: advState.buyer,
        projects: {
          lana: getSelectedProjects('Lana'),
          lahum: getSelectedProjects('Lahum')
        },
        rawPoints: { lana: rawLana, lahum: rawLahum }
      };

      const bunt = BalootScoring.calculateRound(roundData);
      const result = StateManager.addRound(appState, { lana: bunt.lana, lahum: bunt.lahum }, roundData);
      closeRoundModal();
      render();
      checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
      if (result.gameOver) showGameOver(result.winner);
      broadcastState();
    }

    // Placeholder functions (implemented in later tasks)
    function showGameOver(winner) {}

    // ── P2P Manager ─────────────────────────────────────────────

    const PEER_PREFIX = 'blot1-';
    let peer = null;
    let connections = [];
    let hostConn = null;
    let isHost = false;
    let editUnlocked = false;
    let roomCode = '';

    function genRoomCode() {
      return Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function createRoom() {
      roomCode = genRoomCode();
      document.getElementById('roomModalTitle').textContent = 'غرفة جديدة';
      document.getElementById('roomCreateView').style.display = '';
      document.getElementById('roomJoinView').style.display = 'none';
      document.getElementById('roomCodeDisplay').textContent = roomCode;
      document.getElementById('connectedCount').textContent = 'جاري الاتصال...';
      document.getElementById('roomModal').classList.add('open');
      document.getElementById('editLockToggle').checked = false;
      editUnlocked = false;

      isHost = true;
      connections = [];

      peer = new Peer(PEER_PREFIX + roomCode.toLowerCase(), {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        document.getElementById('connectedCount').textContent = '٠ متصلين';
        showRoomStatus('غرفة ' + roomCode + ' • مضيف');
      });

      peer.on('connection', conn => {
        connections.push(conn);
        updateConnCount();

        conn.on('data', msg => {
          if (msg.type === 'round_added' && editUnlocked) {
            const result = StateManager.addRound(appState, msg.payload.bunt, msg.payload.meta || {});
            render();
            checkSayings(result.gameOver ? 'gameOver' : 'roundEnd');
            broadcastState();
          }
        });

        conn.on('close', () => {
          connections = connections.filter(c => c !== conn);
          updateConnCount();
        });

        conn.on('open', () => {
          conn.send({ type: 'state_sync', payload: getStatePayload() });
          conn.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
        });
      });

      peer.on('error', err => {
        console.error('Peer error:', err);
        document.getElementById('connectedCount').textContent = 'خطأ في الاتصال';
      });
    }

    function joinRoom() {
      document.getElementById('roomModalTitle').textContent = 'انضم لغرفة';
      document.getElementById('roomCreateView').style.display = 'none';
      document.getElementById('roomJoinView').style.display = '';
      document.getElementById('joinCodeInput').value = '';
      document.getElementById('joinError').textContent = '';
      document.getElementById('roomModal').classList.add('open');
    }

    function doJoinRoom() {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      if (!code || code.length !== 4) {
        document.getElementById('joinError').textContent = 'أدخل رمز من ٤ أحرف';
        return;
      }
      document.getElementById('joinError').textContent = 'جاري الاتصال...';
      isHost = false;
      roomCode = code;

      peer = new Peer(undefined, {
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      peer.on('open', () => {
        hostConn = peer.connect(PEER_PREFIX + code.toLowerCase());

        hostConn.on('open', () => {
          closeRoomModal();
          showRoomStatus('غرفة ' + code + ' • متصل');
        });

        hostConn.on('data', msg => {
          switch (msg.type) {
            case 'state_sync':
              applyStatePayload(msg.payload);
              render();
              break;
            case 'edit_lock':
              editUnlocked = msg.payload.unlocked;
              document.getElementById('btnNewRound').style.display = editUnlocked ? '' : 'none';
              break;
          }
        });

        hostConn.on('close', () => {
          showRoomStatus('انقطع الاتصال');
          hostConn = null;
        });

        setTimeout(() => {
          if (!hostConn || !hostConn.open) {
            document.getElementById('joinError').textContent = 'لم يتم العثور على الغرفة';
            if (peer) peer.destroy();
          }
        }, 10000);
      });
    }

    function closeRoomModal() {
      document.getElementById('roomModal').classList.remove('open');
    }

    function toggleEditLock() {
      editUnlocked = document.getElementById('editLockToggle').checked;
      connections.forEach(c => {
        if (c.open) c.send({ type: 'edit_lock', payload: { unlocked: editUnlocked } });
      });
    }

    function updateConnCount() {
      const count = connections.filter(c => c.open).length;
      const arabic = count.toLocaleString('ar-SA');
      document.getElementById('connectedCount').textContent = arabic + ' متصلين';
    }

    function showRoomStatus(text) {
      document.getElementById('roomStatus').style.display = '';
      document.getElementById('roomStatusText').textContent = text;
    }

    function getStatePayload() {
      return {
        session: appState.session,
        currentGame: appState.currentGame
      };
    }

    function applyStatePayload(payload) {
      appState.session = payload.session;
      appState.currentGame = payload.currentGame;
      StateManager.save(appState);
    }

    function broadcastState() {
      if (!isHost) {
        if (hostConn && hostConn.open) {
          const rounds = appState.currentGame.rounds;
          const lastRound = rounds[rounds.length - 1];
          if (lastRound) {
            hostConn.send({
              type: 'round_added',
              payload: { bunt: lastRound.bunt, meta: lastRound }
            });
          }
        }
        return;
      }

      const payload = { type: 'state_sync', payload: getStatePayload() };
      connections.forEach(c => {
        if (c.open) c.send(payload);
      });
    }
    // ── Sayings Engine ──────────────────────────────────────────

    const SAYINGS = {
      gameWin1:     'أنزل ثانية',
      tied11:       'افصلها!',
      sweep20:      'نظيفة ✨',
      deciderWin:   'فصلها! 💪',
      closeTo152:   'قربت.. حسمها!',
      neckAndNeck:  'كتف بكتف',
      comeback:     'رجعوا!',
      blowout:      'مسح فيهم الأرض 😂'
    };

    let sayingTimeout = null;

    function showSaying(text) {
      const el = document.getElementById('saying');
      el.textContent = text;
      el.classList.add('visible');
      clearTimeout(sayingTimeout);
      sayingTimeout = setTimeout(() => el.classList.remove('visible'), 4000);
    }

    function hideSaying() {
      const el = document.getElementById('saying');
      el.classList.remove('visible');
      clearTimeout(sayingTimeout);
    }

    function checkSayings(event) {
      const { currentGame, session } = appState;
      const score = currentGame.score;

      if (event === 'gameOver') {
        const wLana = session.wins.lana;
        const wLahum = session.wins.lahum;

        // Session sweep (2-0)
        if ((wLana === 2 && wLahum === 0) || (wLahum === 2 && wLana === 0)) {
          showSaying(SAYINGS.sweep20);
          return;
        }
        // Decider win (2-1)
        if ((wLana === 2 && wLahum === 1) || (wLahum === 2 && wLana === 1)) {
          showSaying(SAYINGS.deciderWin);
          return;
        }
        // Tied 1-1
        if (wLana === 1 && wLahum === 1) {
          showSaying(SAYINGS.tied11);
          return;
        }
        // First game won (1-0)
        const totalGames = wLana + wLahum;
        if (totalGames === 1) {
          showSaying(SAYINGS.gameWin1);
          return;
        }

        // Blowout check on the last finished game
        const lastGame = session.games[session.games.length - 1];
        if (lastGame) {
          const loserScore = Math.min(lastGame.finalScore.lana, lastGame.finalScore.lahum);
          if (loserScore < 50) {
            showSaying(SAYINGS.blowout);
            return;
          }
        }
        return;
      }

      if (event === 'roundEnd') {
        // Comeback: a team that was behind now leads
        const rounds = currentGame.rounds;
        if (rounds.length >= 2) {
          const lastRound = rounds[rounds.length - 1];
          const prevLana = score.lana - lastRound.bunt.lana;
          const prevLahum = score.lahum - lastRound.bunt.lahum;
          const wasLeading = prevLana > prevLahum ? 'lana' : (prevLahum > prevLana ? 'lahum' : null);
          const nowLeading = score.lana > score.lahum ? 'lana' : (score.lahum > score.lana ? 'lahum' : null);
          if (wasLeading && nowLeading && wasLeading !== nowLeading) {
            showSaying(SAYINGS.comeback);
            return;
          }
        }

        // Close to 152
        if (score.lana >= 130 || score.lahum >= 130) {
          showSaying(SAYINGS.closeTo152);
          return;
        }

        // Neck and neck
        if (score.lana > 20 && score.lahum > 20 && Math.abs(score.lana - score.lahum) <= 10) {
          showSaying(SAYINGS.neckAndNeck);
          return;
        }
      }
    }

    // Initial render
    render();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
