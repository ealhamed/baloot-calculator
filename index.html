<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#722F37">
  <title>حاسبة بلوت - الديوانية</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F0E6;
      --burgundy: #722F37;
      --gold: #C9A227;
      --navy: #1A2744;
      --text: #1D1E20;
      --cream: #F5F0E6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button {
      font-family: 'Cairo', sans-serif;
      background: var(--burgundy);
      color: var(--cream);
      border: none;
      border-radius: 28px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }

    .card {
      background: var(--cream);
      border: 1px solid var(--navy);
      border-radius: 20px;
      padding: 12px 16px;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-size: 24px;
      font-weight: 700;
      color: var(--burgundy);
    }
  </style>
</head>
<body>
  <main>حاسبة بلوت - الديوانية</main>

  <script
    src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"
    integrity="sha384-nlUQ8ZqCbvStErob+biJNzSgltf6urV3VGqhfIfzhmg9RXmpeRm76ELw0pYnKlTR"
    crossorigin="anonymous"
  ></script>
  <script>
    // ── Scoring Engine ──────────────────────────────────────────

    const BalootScoring = {
      PROJECT_VALUES: {
        sira:    { sun: 4,  hokm: 2 },
        '50':    { sun: 10, hokm: 5 },
        '100':   { sun: 20, hokm: 10 },
        '400':   { sun: 40, hokm: 10 },
        baloot:  { sun: 0,  hokm: 2 }
      },

      TOTAL_RAW: { sun: 260, hokm: 162 },
      KABOUT_BUNT: { sun: 44, hokm: 25 },
      FAIL_THRESHOLD: { sun: 66, hokm: 81 },
      TOTAL_BUNT: { sun: 26, hokm: 16 },

      rawToBunt(raw, type) {
        if (type === 'sun') {
          const remainder = raw % 10;
          let rounded;
          if (remainder === 5) {
            rounded = raw;
          } else if (remainder < 5) {
            rounded = raw - remainder;
          } else {
            rounded = raw + (10 - remainder);
          }
          return (rounded * 2) / 10;
        } else {
          return Math.floor(raw / 10);
        }
      },

      calcProjects(projects, type, multiplier) {
        let total = 0;
        for (const p of projects) {
          const val = this.PROJECT_VALUES[p]?.[type] || 0;
          if (p === 'baloot') {
            total += val; // baloot is never multiplied
          } else {
            total += val * multiplier;
          }
        }
        return total;
      },

      calculateRound(round) {
        const { type, buyer, multiplier, kabout, kaboutWinner, projects, rawPoints } = round;
        const mult = { normal: 1, double: 2, triple: 3, four: 4, coffee: 1 }[multiplier] || 1;
        const opponent = buyer === 'lana' ? 'lahum' : 'lana';

        if (multiplier === 'coffee') {
          return { lana: 0, lahum: 0, gameOver: true, coffeeWinner: opponent };
        }

        if (kabout) {
          const winner = kaboutWinner || buyer;
          const loser = winner === 'lana' ? 'lahum' : 'lana';
          const kaboutBunt = this.KABOUT_BUNT[type] * mult;
          const projBunt = this.calcProjects(projects[winner] || [], type, mult);
          const result = { lana: 0, lahum: 0, gameOver: false };
          result[winner] = kaboutBunt + projBunt;
          return result;
        }

        const buntLana = this.rawToBunt(rawPoints.lana, type);
        const buntLahum = this.rawToBunt(rawPoints.lahum, type);

        const buyerFailed = rawPoints[buyer] < this.FAIL_THRESHOLD[type];

        let result = { lana: 0, lahum: 0, gameOver: false };

        if (buyerFailed) {
          result[opponent] = this.TOTAL_BUNT[type] * mult;
          result[opponent] += this.calcProjects(projects[opponent] || [], type, mult);
        } else {
          result.lana = buntLana * mult;
          result.lahum = buntLahum * mult;
          result.lana += this.calcProjects(projects.lana || [], type, mult);
          result.lahum += this.calcProjects(projects.lahum || [], type, mult);
        }

        return result;
      }
    };
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
