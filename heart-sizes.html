<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>أحجام القلب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #1A2744; --cream: #F5F0E6; --burgundy: #722F37; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--cream); max-width: 430px; margin: 0 auto; padding: 16px; direction: rtl; }
    h3 { text-align: center; color: #8B7318; font-size: 14px; margin: 20px 0 8px; }
    h3:first-child { margin-top: 4px; }
    .demo {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0 8px;
      align-items: center;
      background: rgba(26,39,68,0.04);
      border-radius: 16px;
      padding: 10px;
    }
    .btn {
      height: 52px;
      border-radius: 8px;
      background: var(--navy);
      color: var(--cream);
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      font-family: 'Cairo', sans-serif;
    }
    .heart {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      position: relative;
    }
    .heart::before {
      content: '♥';
      position: absolute;
      inset: 0;
      color: #C41E3A;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      line-height: 1;
    }
    .heart span {
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .size-label { text-align: center; font-size: 11px; color: var(--navy); opacity: 0.4; margin-top: 4px; }
  </style>
</head>
<body>

<h3>S — ٤٨px</h3>
<div class="demo">
  <button class="btn">−</button>
  <div class="heart" style="width:48px;height:48px;font-size:15px;padding-top:3px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:50px;color:#C41E3A;line-height:1">♥</div><span style="position:relative;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,0.15)">7</span></div>
  <button class="btn">+</button>
</div>
<div class="size-label">٤٨ بكسل — مضغوط</div>

<h3>M — ٥٦px</h3>
<div class="demo">
  <button class="btn">−</button>
  <div class="heart" style="width:56px;height:56px;font-size:17px;padding-top:4px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:58px;color:#C41E3A;line-height:1">♥</div><span style="position:relative;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,0.15)">7</span></div>
  <button class="btn">+</button>
</div>
<div class="size-label">٥٦ بكسل — متوسط</div>

<h3>L — ٦٤px</h3>
<div class="demo">
  <button class="btn">−</button>
  <div class="heart" style="width:64px;height:64px;font-size:20px;padding-top:5px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:66px;color:#C41E3A;line-height:1">♥</div><span style="position:relative;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,0.15)">7</span></div>
  <button class="btn">+</button>
</div>
<div class="size-label">٦٤ بكسل — كبير</div>

<h3>XL — ٧٢px</h3>
<div class="demo">
  <button class="btn">−</button>
  <div class="heart" style="width:72px;height:72px;font-size:22px;padding-top:6px"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:74px;color:#C41E3A;line-height:1">♥</div><span style="position:relative;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,0.15)">7</span></div>
  <button class="btn">+</button>
</div>
<div class="size-label">٧٢ بكسل — كبير جداً</div>

<div style="height:32px"></div>
</body>
</html>
