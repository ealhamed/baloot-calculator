<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root { --bg: #F5F0E6; --burgundy: #722F37; --gold: #C9A227; --gold-text: #8B7318; --navy: #1A2744; --text: #1D1E20; --cream: #F5F0E6; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; padding: 16px; direction: rtl; user-select: none; }
button { font-family: 'Cairo', sans-serif; border: none; cursor: pointer; }
h2 { text-align: center; font-size: 14px; color: var(--gold-text); margin: 24px 0 4px; }
h3 { text-align: center; font-size: 11px; color: var(--navy); opacity: 0.3; margin-bottom: 10px; }

/* ── Player row ── */
.row {
  border: 1px solid rgba(26,39,68,0.08);
  border-radius: 14px;
  padding: 10px 12px;
  margin-bottom: 6px;
  background: rgba(26,39,68,0.02);
  display: flex;
  align-items: center;
  gap: 10px;
}
.row-name { font-size: 13px; font-weight: 700; color: var(--navy); min-width: 44px; }
.row-items { display: flex; align-items: center; gap: 8px; flex: 1; }
.row-score { font-size: 20px; font-weight: 700; color: var(--burgundy); min-width: 30px; text-align: center; }

/* ── Card chips — bigger suit icons, colored backgrounds ── */
.chip {
  padding: 6px 12px; border-radius: 10px; font-weight: 700;
  text-align: center; transition: all 0.15s; line-height: 1.2; cursor: pointer;
  opacity: 0.35;
}
.chip.active { opacity: 1; }
.chip:active { transform: scale(0.9); }
.chip-spade {
  background: var(--navy); color: var(--cream);
}
.chip-spade .suit { font-size: 16px; }
.chip-spade .clabel { font-size: 10px; font-weight: 700; }
.chip-diamond {
  background: var(--burgundy); color: var(--cream);
}
.chip-diamond .suit { font-size: 16px; }
.chip-diamond .clabel { font-size: 10px; font-weight: 700; }

/* ── Joined stepper (C3 style — outlined, joined, circle count) ── */
.stepper {
  display: flex;
  align-items: center;
  position: relative;
}
.stepper-btn {
  width: 34px; height: 34px;
  background: transparent; color: var(--navy);
  border: 2px solid var(--navy);
  font-size: 20px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  transition: all 0.1s;
}
.stepper-btn:active { background: var(--navy); color: var(--cream); }
.stepper-plus { border-radius: 8px 0 0 8px; border-left: 2px solid var(--navy); }
.stepper-minus { border-radius: 0 8px 8px 0; border-right: 2px solid var(--navy); }
.stepper-count {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--cream); border: 2px solid var(--navy);
  font-size: 15px; font-weight: 700; color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  margin: 0 -4px;
}
</style>
</head>
<body>

<h2>بنت السبيت — تصميم البطاقة</h2>
<h3>Joined outlined stepper + colored card chips</h3>

<div class="row">
  <span class="row-name">لاعب ١</span>
  <div class="row-items">
    <span class="chip chip-spade active" onclick="this.classList.toggle('active')"><span class="suit">♠</span><br><span class="clabel">بنت</span></span>
    <span class="chip chip-diamond" onclick="this.classList.toggle('active')"><span class="suit">♦</span><br><span class="clabel">١٠</span></span>
    <div class="stepper">
      <button class="stepper-btn stepper-plus" onclick="step(this,1)">+</button>
      <span class="stepper-count">3</span>
      <button class="stepper-btn stepper-minus" onclick="step(this,-1)">−</button>
    </div>
  </div>
  <span class="row-score">16</span>
</div>

<div class="row">
  <span class="row-name">لاعب ٢</span>
  <div class="row-items">
    <span class="chip chip-spade" onclick="this.classList.toggle('active')"><span class="suit">♠</span><br><span class="clabel">بنت</span></span>
    <span class="chip chip-diamond active" onclick="this.classList.toggle('active')"><span class="suit">♦</span><br><span class="clabel">١٠</span></span>
    <div class="stepper">
      <button class="stepper-btn stepper-plus" onclick="step(this,1)">+</button>
      <span class="stepper-count">5</span>
      <button class="stepper-btn stepper-minus" onclick="step(this,-1)">−</button>
    </div>
  </div>
  <span class="row-score">15</span>
</div>

<div class="row">
  <span class="row-name">لاعب ٣</span>
  <div class="row-items">
    <span class="chip chip-spade" onclick="this.classList.toggle('active')"><span class="suit">♠</span><br><span class="clabel">بنت</span></span>
    <span class="chip chip-diamond" onclick="this.classList.toggle('active')"><span class="suit">♦</span><br><span class="clabel">١٠</span></span>
    <div class="stepper">
      <button class="stepper-btn stepper-plus" onclick="step(this,1)">+</button>
      <span class="stepper-count">0</span>
      <button class="stepper-btn stepper-minus" onclick="step(this,-1)">−</button>
    </div>
  </div>
  <span class="row-score">0</span>
</div>

<div class="row">
  <span class="row-name">لاعب ٤</span>
  <div class="row-items">
    <span class="chip chip-spade active" onclick="this.classList.toggle('active')"><span class="suit">♠</span><br><span class="clabel">بنت</span></span>
    <span class="chip chip-diamond active" onclick="this.classList.toggle('active')"><span class="suit">♦</span><br><span class="clabel">١٠</span></span>
    <div class="stepper">
      <button class="stepper-btn stepper-plus" onclick="step(this,1)">+</button>
      <span class="stepper-count">5</span>
      <button class="stepper-btn stepper-minus" onclick="step(this,-1)">−</button>
    </div>
  </div>
  <span class="row-score">28</span>
</div>

<div style="height:40px"></div>

<script>
function step(btn, d) {
  const c = btn.parentElement.querySelector('.stepper-count');
  c.textContent = Math.max(0, Math.min(13, (parseInt(c.textContent)||0) + d));
}
</script>
</body>
</html>
